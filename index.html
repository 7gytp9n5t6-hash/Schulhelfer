<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SchulHelfer — Oberstufe im Griff</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f6f1;
    --bg2: #efece6;
    --card: #ffffff;
    --text: #1a1a2e;
    --text2: #5a5a7a;
    --text3: #9a9ab0;
    --border: #e8e6e1;
    --accent: #4338ca;
    --accent2: #6d5dfc;
    --accent-bg: #eef0ff;
    --red: #e53e3e;
    --green: #22c55e;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 16px;
    --header-from: #312e81;
    --header-mid: #4338ca;
    --header-to: #6d5dfc;
  }

  [data-theme="dark"] {
    --bg: #111118;
    --bg2: #1a1a24;
    --card: #1e1e2c;
    --text: #e8e8f0;
    --text2: #a0a0b8;
    --text3: #6a6a82;
    --border: #2a2a3c;
    --accent: #6d5dfc;
    --accent2: #8b7fff;
    --accent-bg: #252240;
    --shadow: 0 2px 12px rgba(0,0,0,0.25);
    --header-from: #1a1840;
    --header-mid: #2d2a6e;
    --header-to: #4a3faa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  .app {
    max-width: 540px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: linear-gradient(135deg, var(--header-from) 0%, var(--header-mid) 40%, var(--header-to) 100%);
    padding: 32px 24px 26px;
    border-radius: 0 0 32px 32px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%; left: -20%;
    width: 140%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-content { position: relative; text-align: center; }
  .header-top { display: flex; justify-content: flex-end; margin-bottom: 4px; }
  .dark-toggle {
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .dark-toggle:hover { background: rgba(255,255,255,0.25); }
  .header-logo { font-size: 40px; display: block; margin-bottom: 2px; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.25)); }
  .header h1 { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 900; color: #fff; letter-spacing: -1px; }
  .header p { font-size: 13px; color: rgba(255,255,255,0.65); font-weight: 500; margin-top: 2px; }

  .period-bar { display: flex; gap: 6px; padding: 12px 16px 0; }
  .period-btn {
    flex: 1; padding: 8px 6px; border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--card); color: var(--text2); font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; font-family: inherit; text-align: center;
  }
  .period-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }

  .tabs {
    display: flex; gap: 8px; padding: 12px 16px 0;
    position: sticky; top: 0; z-index: 100; background: var(--bg); transition: background 0.3s;
  }
  .tab-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 11px 10px; border: none; border-radius: 14px; background: var(--card);
    color: var(--text2); font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all 0.25s cubic-bezier(.4,0,.2,1); box-shadow: var(--shadow);
    font-family: inherit; position: relative;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    box-shadow: 0 6px 24px rgba(67,56,202,0.35); transform: translateY(-1px);
  }
  .tab-emoji { font-size: 17px; }
  .badge {
    position: absolute; top: -5px; right: -5px; background: var(--red); color: #fff;
    font-size: 11px; font-weight: 800; border-radius: 10px; padding: 1px 7px;
    min-width: 18px; text-align: center; box-shadow: 0 2px 6px rgba(229,62,62,0.4);
  }

  .content { padding: 14px 16px 40px; flex: 1; }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .add-btn {
    width: 100%; padding: 15px; border: 2.5px dashed var(--border); border-radius: var(--radius);
    background: transparent; color: var(--accent); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin-bottom: 14px; font-family: inherit;
  }
  .add-btn:hover { background: var(--accent-bg); border-color: var(--accent); }

  .form-card {
    background: var(--card); border-radius: 20px; padding: 22px; margin-bottom: 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.08); border: 1px solid rgba(67,56,202,0.1);
    animation: fadeUp 0.25s ease;
  }
  .form-card h3 { font-size: 17px; font-weight: 800; margin-bottom: 14px; color: var(--text); }
  .form-label {
    display: block; font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px; margin: 12px 0 5px;
  }
  .form-label:first-of-type { margin-top: 0; }
  .form-select, .form-input {
    width: 100%; padding: 11px 14px; border-radius: 12px; border: 1.5px solid var(--border);
    font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .form-select:focus, .form-input:focus { border-color: var(--accent); }
  .form-actions { display: flex; gap: 8px; margin-top: 18px; }
  .btn-cancel {
    flex: 1; padding: 11px; border: 1.5px solid var(--border); border-radius: 12px;
    background: var(--card); color: var(--text2); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .btn-submit {
    flex: 1; padding: 11px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(67,56,202,0.3);
  }

  /* Subject grade card */
  .sgc {
    background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 10px;
    box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent;
  }
  .sgc:hover { border-color: var(--accent); }
  .sgc.open { border-color: var(--accent); cursor: default; }
  .sgc-header { display: flex; align-items: center; gap: 10px; }
  .sgc-emoji { font-size: 26px; }
  .sgc-info { flex: 1; }
  .sgc-name { font-size: 15px; font-weight: 700; }
  .sgc-detail { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .sgc-avg { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: -1px; text-align: right; }
  .sgc-avg-note { font-size: 11px; font-weight: 600; color: var(--text3); text-align: right; }
  .sgc-no { font-size: 24px; color: var(--text3); font-weight: 300; }

  /* Expand */
  .sgc-expand {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); animation: fadeUp 0.2s ease;
  }
  .entry-row { display: flex; gap: 12px; margin-bottom: 8px; }
  .entry-col { flex: 1; text-align: center; }
  .entry-col label {
    display: block; font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .qgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .qbtn {
    height: 34px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    font-family: inherit; background: var(--bg); color: var(--text2);
  }
  .qbtn.active { border-color: transparent; color: #fff; }
  .save-row { display: flex; gap: 8px; margin-top: 14px; }

  .eg {
    margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
  }
  .eg-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .eg-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; }
  .eg-type { font-weight: 600; color: var(--text2); width: 68px; font-size: 12px; }
  .eg-pts { font-family: 'Outfit'; font-weight: 800; font-size: 17px; }
  .eg-note { font-size: 12px; color: var(--text3); flex: 1; }
  .eg-date { font-size: 11px; color: var(--text3); }
  .eg-del {
    border: none; background: none; color: var(--text3); font-size: 15px;
    cursor: pointer; padding: 2px 4px; border-radius: 6px;
  }
  .eg-del:hover { color: var(--red); }

  /* HW */
  .hw-card {
    display: flex; align-items: flex-start; gap: 11px; background: var(--card);
    border-radius: var(--radius); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .hw-card.done { opacity: 0.5; }
  .hw-check {
    width: 24px; height: 24px; border-radius: 8px; border: 2.5px solid;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; margin-top: 1px; font-size: 13px; font-weight: 700; color: transparent;
  }
  .hw-check.checked { color: #fff; }
  .hw-body { flex: 1; min-width: 0; }
  .hw-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
  .stag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 9px; border-radius: 7px; font-size: 12px; font-weight: 700; white-space: nowrap;
  }
  .overdue-tag { font-size: 11px; font-weight: 700; color: var(--red); background: rgba(229,62,62,0.1); padding: 2px 7px; border-radius: 6px; }
  .hw-text { font-size: 14px; color: var(--text); line-height: 1.45; word-break: break-word; margin: 2px 0; }
  .hw-text.strike { text-decoration: line-through; color: var(--text2); }
  .hw-due { font-size: 12px; font-weight: 500; margin-top: 2px; }
  .del-btn {
    border: none; background: none; color: var(--text3); font-size: 17px;
    cursor: pointer; padding: 4px; line-height: 1; border-radius: 8px; flex-shrink: 0;
  }
  .del-btn:hover { color: var(--red); }
  .section-div { display: flex; align-items: center; gap: 10px; margin: 18px 0 10px; }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }

  .avg-card {
    background: var(--card); border-radius: 22px; padding: 22px; margin-bottom: 14px;
    box-shadow: var(--shadow); border: 1px solid var(--border); text-align: center;
  }
  .avg-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
  .avg-value { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 900; letter-spacing: -1.5px; display: block; margin: 2px 0; }
  .avg-note { font-size: 13px; color: var(--text2); font-weight: 500; }

  .empty { text-align: center; padding: 44px 20px; }
  .empty-icon { font-size: 52px; display: block; margin-bottom: 8px; }
  .empty-text { font-size: 16px; font-weight: 600; color: var(--text2); }
  .empty-hint { font-size: 13px; color: var(--text3); margin-top: 4px; }
  .hint-text { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 12px; }

  @media (max-width: 400px) {
    .header { padding: 26px 16px 22px; }
    .header h1 { font-size: 24px; }
    .content { padding: 12px 12px 32px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-content">
      <div class="header-top">
        <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()">🌙</button>
      </div>
      <span class="header-logo">🎓</span>
      <h1>SchulHelfer</h1>
      <p>Oberstufe im Griff</p>
    </div>
  </div>

  <div class="period-bar" id="period-bar"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="homework" onclick="switchTab('homework')">
      <span class="tab-emoji">📋</span> Hausaufgaben
      <span class="badge" id="hw-badge" style="display:none">0</span>
    </button>
    <button class="tab-btn" data-tab="grades" onclick="switchTab('grades')">
      <span class="tab-emoji">📊</span> Noten
    </button>
  </div>

  <div class="content">
    <div class="tab-content active" id="tab-homework">
      <button class="add-btn" id="hw-add-btn" onclick="toggleHwForm(true)">+ Neue Hausaufgabe</button>
      <div class="form-card" id="hw-form" style="display:none">
        <h3>Neue Hausaufgabe</h3>
        <label class="form-label">Fach</label>
        <select class="form-select" id="hw-subject"></select>
        <label class="form-label">Aufgabe</label>
        <input class="form-input" id="hw-text" type="text" placeholder="z.B. S. 42 Nr. 3a-d">
        <label class="form-label">Fällig am (optional)</label>
        <input class="form-input" id="hw-date" type="date">
        <div class="form-actions">
          <button class="btn-cancel" onclick="toggleHwForm(false)">Abbrechen</button>
          <button class="btn-submit" onclick="addHomework()">Hinzufügen</button>
        </div>
      </div>
      <div id="hw-open-list"></div>
      <div id="hw-done-section"></div>
    </div>

    <div class="tab-content" id="tab-grades">
      <div id="avg-overview"></div>
      <p class="hint-text">Tippe auf ein Fach, um Noten einzutragen</p>
      <div id="subject-list"></div>
    </div>
  </div>
</div>

<script>
const SUBJECTS=[
  {name:"Deutsch",emoji:"📖",color:"#c0392b"},
  {name:"Mathematik",emoji:"📐",color:"#2563eb"},
  {name:"Englisch",emoji:"🇬🇧",color:"#7c3aed"},
  {name:"Französisch",emoji:"🇫🇷",color:"#1d4ed8"},
  {name:"Spanisch",emoji:"🇪🇸",color:"#ca8a04"},
  {name:"Latein",emoji:"🏛️",color:"#92400e"},
  {name:"Geschichte",emoji:"⏳",color:"#a0522d"},
  {name:"Politik/Wirtschaft",emoji:"🏛️",color:"#1e40af"},
  {name:"Erdkunde",emoji:"🌍",color:"#15803d"},
  {name:"Physik",emoji:"⚛️",color:"#0369a1"},
  {name:"Chemie",emoji:"🧪",color:"#7e22ce"},
  {name:"Biologie",emoji:"🧬",color:"#16a34a"},
  {name:"Informatik",emoji:"💻",color:"#0d9488"},
  {name:"Kunst",emoji:"🎨",color:"#dc2626"},
  {name:"Musik",emoji:"🎵",color:"#9333ea"},
  {name:"Sport",emoji:"⚽",color:"#ea580c"},
  {name:"Religion",emoji:"✝️",color:"#6b7280"},
  {name:"Ethik",emoji:"🤔",color:"#475569"},
  {name:"Philosophie",emoji:"💭",color:"#64748b"},
  {name:"Seminarfach",emoji:"📝",color:"#334155"},
];

const PERIODS=[{id:"q1",label:"Q1"},{id:"q2",label:"Q2"},{id:"q3",label:"Q3"},{id:"q4",label:"Q4"}];

const PL={15:"1+",14:"1",13:"1-",12:"2+",11:"2",10:"2-",9:"3+",8:"3",7:"3-",6:"4+",5:"4",4:"4-",3:"5+",2:"5",1:"5-",0:"6"};

function pc(p){if(p>=13)return"#16a34a";if(p>=10)return"#65a30d";if(p>=7)return"#ca8a04";if(p>=4)return"#ea580c";return"#dc2626"}
function gs(n){return SUBJECTS.find(s=>s.name===n)||SUBJECTS[0]}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fd(d){return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}

let homework=JSON.parse(localStorage.getItem('sh-hw')||'[]');
let grades=JSON.parse(localStorage.getItem('sh-gr')||'[]');
let curP=localStorage.getItem('sh-p')||'q1';
let dark=localStorage.getItem('sh-dk')==='true';
let openS=null,tmpW=null,tmpO=null;

function save(){
  localStorage.setItem('sh-hw',JSON.stringify(homework));
  localStorage.setItem('sh-gr',JSON.stringify(grades));
  localStorage.setItem('sh-p',curP);
  localStorage.setItem('sh-dk',dark);
}

function applyDark(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('dark-toggle').textContent=dark?'☀️':'🌙';
}
function toggleDark(){dark=!dark;save();applyDark()}

function renderPeriods(){
  document.getElementById('period-bar').innerHTML=PERIODS.map(p=>
    `<button class="period-btn${curP===p.id?' active':''}" onclick="setP('${p.id}')">${p.label}</button>`
  ).join('');
}
function setP(id){curP=id;openS=null;save();renderPeriods();renderHW();renderGR()}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+t));
}

function popSel(){
  document.getElementById('hw-subject').innerHTML=SUBJECTS.map(s=>`<option value="${s.name}">${s.emoji} ${s.name}</option>`).join('');
}

function toggleHwForm(show){
  document.getElementById('hw-form').style.display=show?'block':'none';
  document.getElementById('hw-add-btn').style.display=show?'none':'block';
  if(show)document.getElementById('hw-text').focus();
}

function addHomework(){
  const t=document.getElementById('hw-text').value.trim();
  if(!t)return;
  homework.unshift({id:Date.now(),subject:document.getElementById('hw-subject').value,text:t,due:document.getElementById('hw-date').value||null,done:false,period:curP});
  save();document.getElementById('hw-text').value='';document.getElementById('hw-date').value='';
  toggleHwForm(false);renderHW();
}
function toggleDone(id){const i=homework.find(h=>h.id===id);if(i)i.done=!i.done;save();renderHW()}
function removeHW(id){homework=homework.filter(h=>h.id!==id);save();renderHW()}

function renderHW(){
  const f=homework.filter(h=>!h.period||h.period===curP);
  const o=f.filter(h=>!h.done),d=f.filter(h=>h.done);
  const today=new Date(new Date().toDateString());
  const b=document.getElementById('hw-badge');
  b.textContent=o.length;b.style.display=o.length>0?'block':'none';

  document.getElementById('hw-open-list').innerHTML=o.length===0&&d.length===0
    ?`<div class="empty"><span class="empty-icon">📚</span><p class="empty-text">Keine Hausaufgaben in ${PERIODS.find(p=>p.id===curP).label}.</p><p class="empty-hint">Tippe auf "+ Neue Hausaufgabe" um loszulegen!</p></div>`
    :o.map(h=>{const s=gs(h.subject);const ov=h.due&&new Date(h.due)<today;
      return`<div class="hw-card"><div class="hw-check" style="border-color:${s.color}" onclick="toggleDone(${h.id})"></div><div class="hw-body"><div class="hw-top"><span class="stag" style="background:${s.color}15;color:${s.color}">${s.emoji} ${s.name}</span>${ov?'<span class="overdue-tag">Überfällig!</span>':''}</div><p class="hw-text">${esc(h.text)}</p>${h.due?`<p class="hw-due" style="color:${ov?'var(--red)':'var(--text3)'}">Fällig: ${fd(h.due)}</p>`:''}</div><button class="del-btn" onclick="removeHW(${h.id})">✕</button></div>`}).join('');

  document.getElementById('hw-done-section').innerHTML=d.length===0?'':
    `<div class="section-div"><span class="section-line"></span><span class="section-label">Erledigt (${d.length})</span><span class="section-line"></span></div>`+
    d.map(h=>{const s=gs(h.subject);
      return`<div class="hw-card done"><div class="hw-check checked" style="border-color:${s.color};background:${s.color}" onclick="toggleDone(${h.id})">✓</div><div class="hw-body"><span class="stag" style="background:${s.color}15;color:${s.color};font-size:11px">${s.emoji} ${s.name}</span><p class="hw-text strike">${esc(h.text)}</p></div><button class="del-btn" onclick="removeHW(${h.id})">✕</button></div>`}).join('');
}

function gfs(n){return grades.filter(g=>g.subject===n&&g.period===curP)}
function calcAvg(sg){
  if(!sg.length)return null;
  const w=sg.filter(g=>g.type==='S'),o=sg.filter(g=>g.type==='M');
  const wa=w.length?w.reduce((s,g)=>s+g.points,0)/w.length:null;
  const oa=o.length?o.reduce((s,g)=>s+g.points,0)/o.length:null;
  if(wa!==null&&oa!==null)return Math.round((wa+oa)/2*10)/10;
  return wa!==null?Math.round(wa*10)/10:oa!==null?Math.round(oa*10)/10:null;
}

function togS(n){if(openS===n){openS=null}else{openS=n;tmpW=null;tmpO=null}renderGR()}
function setTG(t,v){
  if(t==='w')tmpW=tmpW===v?null:v;
  if(t==='o')tmpO=tmpO===v?null:v;
  renderGR();
}
function saveGE(n){
  const now=new Date().toISOString().slice(0,10);
  if(tmpW!==null)grades.unshift({id:Date.now(),subject:n,points:tmpW,type:'S',period:curP,date:now});
  if(tmpO!==null)grades.unshift({id:Date.now()+1,subject:n,points:tmpO,type:'M',period:curP,date:now});
  tmpW=null;tmpO=null;save();renderGR();
}
function remGR(id){grades=grades.filter(g=>g.id!==id);save();renderGR()}

function qbtns(type,sel){
  let h='<div class="qgrid">';
  for(let p=15;p>=0;p--){
    const a=sel===p;const c=a?pc(p):'';
    h+=`<button class="qbtn${a?' active':''}" style="${a?'background:'+c+';border-color:'+c:''}" onclick="event.stopPropagation();setTG('${type}',${p})">${p}</button>`;
  }
  h+='</div>';return h;
}

function renderGR(){
  const pg=grades.filter(g=>g.period===curP);
  const sAvgs=[];
  SUBJECTS.forEach(s=>{const a=calcAvg(gfs(s.name));if(a!==null)sAvgs.push(a)});
  const tAvg=sAvgs.length?(sAvgs.reduce((a,b)=>a+b,0)/sAvgs.length).toFixed(1):null;

  document.getElementById('avg-overview').innerHTML=tAvg!==null?`
    <div class="avg-card">
      <span class="avg-label">Schnitt ${PERIODS.find(p=>p.id===curP).label}</span>
      <span class="avg-value" style="color:${pc(Math.round(tAvg))}">${tAvg} Punkte</span>
      <span class="avg-note">≈ Note ${PL[Math.round(tAvg)]} · ${sAvgs.length} Fächer</span>
    </div>`:'';

  document.getElementById('subject-list').innerHTML=SUBJECTS.map(s=>{
    const sg=gfs(s.name),avg=calcAvg(sg);
    const w=sg.filter(g=>g.type==='S'),o=sg.filter(g=>g.type==='M');
    const wa=w.length?(w.reduce((a,g)=>a+g.points,0)/w.length).toFixed(1):null;
    const oa=o.length?(o.reduce((a,g)=>a+g.points,0)/o.length).toFixed(1):null;
    const isO=openS===s.name;

    let det='Noch keine Noten';
    if(wa!==null&&oa!==null)det=`✍️ ${wa} · 🗣️ ${oa}`;
    else if(wa!==null)det=`✍️ Schriftlich: ${wa}`;
    else if(oa!==null)det=`🗣️ Mündlich: ${oa}`;

    let exp='';
    if(isO){
      exp=`<div class="sgc-expand">
        <div class="entry-row">
          <div class="entry-col"><label>✍️ Schriftlich</label>${qbtns('w',tmpW)}</div>
          <div class="entry-col"><label>🗣️ Mündlich</label>${qbtns('o',tmpO)}</div>
        </div>
        <div class="save-row">
          <button class="btn-cancel" onclick="event.stopPropagation();togS('${s.name}')">Abbrechen</button>
          <button class="btn-submit" onclick="event.stopPropagation();saveGE('${s.name}')" ${tmpW===null&&tmpO===null?'disabled style="opacity:0.5"':''}>Speichern</button>
        </div>
        ${sg.length?`<div class="eg"><div class="eg-title">Bisherige Einträge</div>${sg.map(g=>
          `<div class="eg-item"><span class="eg-type">${g.type==='S'?'✍️ Schr.':'🗣️ Mdl.'}</span><span class="eg-pts" style="color:${pc(g.points)}">${g.points}</span><span class="eg-note">(${PL[g.points]})</span><span class="eg-date">${fd(g.date)}</span><button class="eg-del" onclick="event.stopPropagation();remGR(${g.id})">✕</button></div>`
        ).join('')}</div>`:''}
      </div>`;
    }

    return`<div class="sgc${isO?' open':''}" onclick="${isO?'':`togS('${s.name}')`}">
      <div class="sgc-header">
        <span class="sgc-emoji">${s.emoji}</span>
        <div class="sgc-info"><div class="sgc-name">${s.name}</div><div class="sgc-detail">${det}</div></div>
        ${avg!==null?`<div><div class="sgc-avg" style="color:${pc(Math.round(avg))}">${avg}</div><div class="sgc-avg-note">${PL[Math.round(avg)]}</div></div>`:`<span class="sgc-no">—</span>`}
      </div>${exp}</div>`;
  }).join('');
}

document.getElementById('hw-text').addEventListener('keydown',e=>{if(e.key==='Enter')addHomework()});

applyDark();popSel();renderPeriods();renderHW();renderGR();
</script>
</body>
</html>
