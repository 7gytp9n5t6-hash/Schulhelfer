<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ScholarSync">
<title>ScholarSync</title>
<style>
:root{--f:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif}
[data-mode="light"]{--bg:#e2dfda;--card:#fff;--card2:#f3f2ef;--card3:#eae8e4;--text:#0a0a0a;--text2:#4a4a4a;--text3:#8a8a8a;--border:rgba(0,0,0,0.06);--sep:rgba(0,0,0,0.05);--accent:#151515;--accent-bg:rgba(0,0,0,0.04);--bar:#ffffffee;--red:#bf360c;--green:#2e7d32;--amber:#e65100;--icon:#777;--icon-a:#111;--s1:0 1px 2px rgba(0,0,0,0.03),0 2px 4px rgba(0,0,0,0.03);--s2:0 2px 6px rgba(0,0,0,0.04),0 8px 20px rgba(0,0,0,0.05);--s3:0 4px 8px rgba(0,0,0,0.04),0 12px 28px rgba(0,0,0,0.07),0 24px 56px rgba(0,0,0,0.05),0 0 0 .5px rgba(0,0,0,0.04);--gl:linear-gradient(168deg,rgba(255,255,255,0.75) 0%,rgba(255,255,255,0.1) 35%,transparent 60%);--hdr:#fff;--ht:#0a0a0a;--hs:#999;--wb:#eeecE8;--stat:linear-gradient(150deg,#fff,#f7f6f3)}
[data-mode="dark"]{--bg:#050505;--card:#161616;--card2:#111;--card3:#0c0c0c;--text:#f2f2f2;--text2:#b0b0b0;--text3:#5a5a5a;--border:rgba(255,255,255,0.06);--sep:rgba(255,255,255,0.04);--accent:#e8e8e8;--accent-bg:rgba(255,255,255,0.05);--bar:#161616ee;--red:#ff5722;--green:#66bb6a;--amber:#ffab00;--icon:#777;--icon-a:#f0f0f0;--s1:0 1px 2px rgba(0,0,0,0.3);--s2:0 2px 6px rgba(0,0,0,0.25),0 8px 20px rgba(0,0,0,0.2);--s3:0 4px 8px rgba(0,0,0,0.3),0 12px 28px rgba(0,0,0,0.2),0 24px 56px rgba(0,0,0,0.15),0 0 0 .5px rgba(255,255,255,0.04);--gl:linear-gradient(168deg,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0.01) 35%,transparent 60%);--hdr:#161616;--ht:#f0f0f0;--hs:#555;--wb:#0e0e0e;--stat:linear-gradient(150deg,#1a1a1a,#131313)}

/* WOODS */
[data-wood="walnut"] .header{background:linear-gradient(180deg,#1e0c04,#3a2015,#4d2e1e)!important}
[data-wood="walnut"] .header::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(91deg,transparent 0,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 3px,transparent 3px,transparent 7px),repeating-linear-gradient(87deg,transparent 0,transparent 4px,rgba(255,180,100,0.04) 4px,rgba(255,180,100,0.04) 5px,transparent 5px,transparent 11px);z-index:0}
[data-wood="walnut"] .header .h-title{color:#e8d5c0!important}[data-wood="walnut"] .header .h-sub{color:#a08060!important}[data-wood="walnut"] .header .h-btn svg{stroke:#d0b898!important}
[data-wood="walnut"] .bnav{background:linear-gradient(0deg,#1a0c04,#2e1a0c)!important;border-top:1px solid rgba(255,160,80,0.08)!important}
[data-wood="walnut"] .bnav-btn span{color:#a08060!important}[data-wood="walnut"] .bnav-btn.active span{color:#e8d5c0!important}[data-wood="walnut"] .bnav-btn svg{stroke:#907050!important}[data-wood="walnut"] .bnav-btn.active svg{stroke:#e8d5c0!important}

[data-wood="oak"] .header{background:linear-gradient(180deg,#c4a882,#b89b72,#a88c62)!important}[data-wood="oak"] .header::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(87deg,transparent 0,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px,transparent 4px,transparent 10px);z-index:0}[data-wood="oak"] .header .h-title{color:#2a1a08!important}[data-wood="oak"] .header .h-sub{color:#5a4020!important}[data-wood="oak"] .header .h-btn{background:rgba(0,0,0,0.08)!important}[data-wood="oak"] .header .h-btn svg{stroke:#3a2810!important}

[data-wood="mahogany"] .header{background:linear-gradient(180deg,#2e0a18,#4a1428,#5a1a30)!important}[data-wood="mahogany"] .header::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(90deg,transparent 0,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px,transparent 4px,transparent 8px),repeating-linear-gradient(88deg,transparent 0,transparent 5px,rgba(255,80,80,0.03) 5px,rgba(255,80,80,0.03) 6px,transparent 6px,transparent 13px);z-index:0}[data-wood="mahogany"] .header .h-title{color:#f0c8d0!important}[data-wood="mahogany"] .header .h-sub{color:#b07080!important}[data-wood="mahogany"] .header .h-btn svg{stroke:#e0a0b0!important}

[data-wood="ebony"] .header{background:linear-gradient(180deg,#0a0808,#1a1614,#22201e)!important}[data-wood="ebony"] .header::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(89deg,transparent 0,transparent 4px,rgba(255,255,255,0.015) 4px,rgba(255,255,255,0.015) 5px,transparent 5px,transparent 10px);z-index:0}[data-wood="ebony"] .header .h-title{color:#d8d0c8!important}[data-wood="ebony"] .header .h-sub{color:#807870!important}[data-wood="ebony"] .header .h-btn svg{stroke:#a0988e!important}[data-wood="ebony"] .bnav{background:linear-gradient(0deg,#080604,#141210)!important}[data-wood="ebony"] .bnav-btn span{color:#706860!important}[data-wood="ebony"] .bnav-btn.active span{color:#d8d0c8!important}[data-wood="ebony"] .bnav-btn svg{stroke:#706860!important}[data-wood="ebony"] .bnav-btn.active svg{stroke:#d8d0c8!important}

[data-wood="cherry"] .header{background:linear-gradient(180deg,#8b4531,#a05540,#b06650)!important}[data-wood="cherry"] .header::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(88deg,transparent 0,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px,transparent 4px,transparent 9px);z-index:0}[data-wood="cherry"] .header .h-title{color:#fce8d8!important}[data-wood="cherry"] .header .h-sub{color:#dab8a0!important}[data-wood="cherry"] .header .h-btn svg{stroke:#f0d0b8!important}

[data-wood="teak"] .header{background:linear-gradient(180deg,#8a7040,#9a8050,#aa9060)!important}[data-wood="teak"] .header::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(90deg,transparent 0,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px,transparent 4px,transparent 8px),repeating-linear-gradient(86deg,transparent 0,transparent 6px,rgba(255,220,140,0.03) 6px,rgba(255,220,140,0.03) 7px,transparent 7px,transparent 14px);z-index:0}[data-wood="teak"] .header .h-title{color:#f8f0e0!important}[data-wood="teak"] .header .h-sub{color:#c8b890!important}[data-wood="teak"] .header .h-btn svg{stroke:#e0d0b0!important}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{transition:background .6s,color .6s}
.app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.header{background:var(--hdr);padding:max(env(safe-area-inset-top),8px) 16px 10px;flex-shrink:0;position:relative;overflow:hidden;z-index:10;box-shadow:var(--s2);transition:all .6s}
.h-row{display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.h-left{flex:1;display:flex;align-items:center;gap:8px}
.h-title{font-size:17px;font-weight:700;color:var(--ht);letter-spacing:-.5px;transition:color .6s}
.h-sub{font-size:8px;color:var(--hs);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:color .6s}
.h-btn{background:rgba(128,128,128,.08);border:none;border-radius:10px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.h-btn:active{transform:scale(.82)}
.h-btn svg{width:16px;height:16px;stroke:var(--ht);stroke-width:1.6;fill:none;transition:stroke .6s}

.bnav{flex-shrink:0;display:flex;background:var(--bar);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:.5px solid var(--sep);padding:2px 0 max(env(safe-area-inset-bottom),4px);position:relative;z-index:10;box-shadow:0 -2px 16px rgba(0,0,0,.04);transition:background .6s}
.bnav-btn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 2px 2px;font-family:inherit}
.bnav-btn svg{width:20px;height:20px;stroke:var(--icon);stroke-width:1.5;fill:none;transition:stroke .3s}
.bnav-btn span{font-size:8px;font-weight:500;color:var(--text3);transition:color .3s}
.bnav-btn.active svg{stroke:var(--icon-a);stroke-width:1.8}
.bnav-btn.active span{color:var(--text);font-weight:700}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 14px 16px}
.tc{display:none}.tc.active{display:block;animation:fU .3s ease}
@keyframes fU{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:700px){.scroll{padding:14px 24px}.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.sgrid .c3.open{grid-column:1/-1}}

/* 3D CARD */
.c3{background:var(--stat);border-radius:16px;padding:13px;margin-bottom:8px;border:.5px solid var(--border);position:relative;overflow:hidden;box-shadow:var(--s3);transition:all .4s}
.c3::before{content:'';position:absolute;inset:0;background:var(--gl);pointer-events:none;border-radius:16px}
.c3::after{content:'';position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(to top,rgba(0,0,0,.012),transparent);pointer-events:none;border-radius:16px}

/* CLOCK */
.clock-wrap{text-align:center;margin-bottom:14px}
.clock-digital{font-size:42px;font-weight:200;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.clock-analog{width:100px;height:100px;margin:0 auto}
.clock-label{font-size:10px;color:var(--text3);margin-top:2px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}

.dash-greeting{margin-bottom:2px}
.dash-greeting h2{font-size:22px;font-weight:800;letter-spacing:-.8px}
.dash-greeting p{font-size:12px;color:var(--text2);margin-top:1px}

.dash-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin:10px 0}
@media(min-width:700px){.dash-stats{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--stat);border-radius:14px;padding:12px;border:.5px solid var(--border);position:relative;overflow:hidden;box-shadow:var(--s3)}
.stat-card::before{content:'';position:absolute;inset:0;background:var(--gl);pointer-events:none;border-radius:14px}
.stat-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;box-shadow:var(--s1),inset 0 -1px 2px rgba(0,0,0,.03);background:var(--card2);border:.5px solid var(--sep)}
.stat-ic svg{width:14px;height:14px;stroke-width:1.8;fill:none}
.stat-val{font-size:20px;font-weight:800;letter-spacing:-.8px}
.stat-lbl{font-size:9px;color:var(--text3);font-weight:600;margin-top:1px;text-transform:uppercase;letter-spacing:.5px}

.now-card{background:var(--stat);border-radius:16px;padding:14px;margin-bottom:10px;border:.5px solid var(--border);position:relative;overflow:hidden;box-shadow:var(--s3)}
.now-card::before{content:'';position:absolute;inset:0;background:var(--gl);pointer-events:none;border-radius:16px}
.now-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.now-subj{font-size:18px;font-weight:800;letter-spacing:-.5px}
.now-det{font-size:11px;color:var(--text2);margin-top:1px}
.now-time{font-size:10px;color:var(--text3);margin-top:3px}
.now-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}

.p-row{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.p-btn{flex:1;min-width:0;padding:7px 2px;border:none;border-radius:9px;background:var(--card);color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;box-shadow:var(--s1);transition:all .25s}
.p-btn.active{background:var(--accent);color:var(--bg);box-shadow:var(--s2);transform:translateY(-1px)}

.sec-t{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px}

/* TIMETABLE */
.tt-card{background:var(--card);border-radius:14px;box-shadow:var(--s3);border:.5px solid var(--border);overflow:hidden;margin-bottom:8px;position:relative}
.tt-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);z-index:1}
.tt-grid{display:grid;grid-template-columns:46px repeat(5,1fr);font-size:9px}
.tt-hdr{padding:7px 2px;text-align:center;font-weight:700;color:var(--text2);border-bottom:.5px solid var(--sep);font-size:8px;text-transform:uppercase;letter-spacing:.8px}
.tt-time{padding:4px 1px;text-align:center;font-weight:600;color:var(--text3);font-size:7px;border-right:.5px solid var(--sep);display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.3}
.tt-cell{padding:2px;min-height:32px;border-right:.5px solid var(--sep);border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:center}
.tt-entry{background:var(--accent-bg);border-radius:5px;padding:2px 3px;text-align:center;width:100%;font-size:8px;font-weight:700;color:var(--text);line-height:1.2;border-left:2px solid var(--text3);box-shadow:inset 0 1px 2px rgba(0,0,0,.03)}
.tt-today{background:rgba(46,125,50,.05)}.tt-now{border-left-color:var(--green)!important;background:rgba(46,125,50,.1)}
.tt-free{background:transparent;border-left:2px dashed var(--text3);opacity:.4;font-style:italic}

.act-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.act-btn{flex:1;min-width:100px;padding:10px 8px;border:none;border-radius:12px;background:var(--stat);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;box-shadow:var(--s2);position:relative;overflow:hidden;border:.5px solid var(--border);transition:all .2s}
.act-btn::before{content:'';position:absolute;inset:0;background:var(--gl);pointer-events:none;border-radius:12px}
.act-btn:active{transform:scale(.96);box-shadow:var(--s1)}
.act-btn svg{width:15px;height:15px;stroke:var(--text3);stroke-width:1.6;fill:none}

.photo-st{font-size:10px;text-align:center;padding:5px;margin-bottom:6px;border-radius:6px}
.photo-st.ld{color:var(--amber);background:rgba(230,81,0,.06)}
.photo-st.ok{color:var(--green);background:rgba(46,125,50,.06)}
.photo-st.er{color:var(--red);background:rgba(191,54,12,.06)}

/* ABI CARD */
.abi-card{background:var(--stat);border-radius:18px;padding:16px;margin-bottom:10px;box-shadow:var(--s3);border:.5px solid var(--border);text-align:center;position:relative;overflow:hidden}
.abi-card::before{content:'';position:absolute;inset:0;background:var(--gl);pointer-events:none;border-radius:18px}
.abi-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.abi-val{font-size:38px;font-weight:800;letter-spacing:-2px;margin:2px 0}
.abi-note{font-size:12px;color:var(--text2)}
.abi-detail{font-size:10px;color:var(--text3);margin-top:4px}

/* SUBJECT / GRADE CARDS */
.sgc{cursor:pointer;background:var(--stat)}.sgc.open{cursor:default;border-color:var(--text3)}
.sgc-h{display:flex;align-items:center;gap:9px}
.sgc-ic{width:32px;height:32px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--s1),inset 0 -1px 2px rgba(0,0,0,.03);border:.5px solid var(--sep)}
.sgc-ic svg{width:15px;height:15px;stroke:var(--text2);stroke-width:1.7;fill:none}
.sgc-inf{flex:1}.sgc-n{font-size:13px;font-weight:600;letter-spacing:-.2px}.sgc-d{font-size:10px;color:var(--text2);margin-top:1px}
.sgc-av{font-size:22px;font-weight:800;letter-spacing:-1px;text-align:right}.sgc-an{font-size:9px;font-weight:600;color:var(--text2);text-align:right}.sgc-no{font-size:18px;color:var(--text3);font-weight:200}
.sgc-exp{margin-top:10px;padding-top:10px;border-top:.5px solid var(--sep);animation:fU .2s}

.wrow{display:flex;gap:12px}.wcol{flex:1;text-align:center}.wcol>label{display:block;font-size:10px;font-weight:700;color:var(--text2);margin-bottom:4px}
.wwrap{position:relative;height:140px;overflow:hidden;border-radius:12px;background:var(--wb);box-shadow:inset 0 2px 8px rgba(0,0,0,.06),var(--s1)}
.wwrap::before,.wwrap::after{content:'';position:absolute;left:0;right:0;height:46px;z-index:2;pointer-events:none}
.wwrap::before{top:0;background:linear-gradient(var(--wb),transparent)}.wwrap::after{bottom:0;background:linear-gradient(to top,var(--wb),transparent)}
.w-hl{position:absolute;top:50%;left:3px;right:3px;height:34px;transform:translateY(-50%);background:var(--card);border-radius:8px;z-index:1;box-shadow:var(--s2);border:.5px solid var(--sep)}
.wscr{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;position:relative;z-index:3;scrollbar-width:none}.wscr::-webkit-scrollbar{display:none}
.witm{height:34px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-size:15px;font-weight:600;color:var(--text3);cursor:pointer;user-select:none;transition:all .15s}
.witm.sel{color:var(--text);font-size:17px;font-weight:700}.witm .gl2{font-size:10px;font-weight:400;color:var(--text3);margin-left:4px}
.wpad{height:53px}
.winfo{margin-top:4px;font-size:11px;font-weight:600;height:16px;display:flex;align-items:center;justify-content:center;gap:4px}
.pbdg{display:inline-block;padding:1px 7px;border-radius:5px;color:#fff;font-size:10px;font-weight:700}
.wnone{margin-top:3px;padding:3px 10px;border:.5px solid var(--border);border-radius:6px;background:var(--card2);color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}.wnone.act{border-color:var(--accent);color:var(--text)}
.svrow{display:flex;gap:8px;margin-top:10px}
.eg{margin-top:8px;padding-top:6px;border-top:.5px solid var(--sep)}.eg-t{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.eg-i{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:11px}.eg-tp{font-weight:600;color:var(--text2);width:40px;font-size:10px}.eg-pt{font-weight:800;font-size:14px}.eg-n{font-size:10px;color:var(--text2);flex:1}.eg-dt{font-size:9px;color:var(--text3)}.eg-x{border:none;background:none;color:var(--text3);font-size:13px;cursor:pointer;padding:3px}

/* HW */
.hwc{display:flex;align-items:flex-start;gap:9px;background:var(--stat);border-radius:13px;padding:11px;margin-bottom:7px;border:.5px solid var(--border);box-shadow:var(--s3);position:relative;overflow:hidden;transition:all .5s}
.hwc::before{content:'';position:absolute;inset:0;background:var(--gl);pointer-events:none;border-radius:13px}
.hwc.done{opacity:.3}
.hwck{width:18px;height:18px;border-radius:18px;border:1.5px solid var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}.hwck.chk{background:var(--accent);border-color:var(--accent)}
.hwck svg{width:10px;height:10px;stroke:transparent;stroke-width:2.5;fill:none}.hwck.chk svg{stroke:var(--bg)}
.hwb{flex:1;min-width:0}.hwtp{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:1px}
.htag{padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;background:var(--accent-bg);color:var(--text2)}
.odtag{font-size:8px;font-weight:700;color:var(--red);background:rgba(191,54,12,.06);padding:1px 5px;border-radius:3px}
.hwtx{font-size:12px;line-height:1.3}.hwtx.str{text-decoration:line-through;color:var(--text3)}
.hwdu{font-size:10px;color:var(--text3);margin-top:1px}
.xbtn{border:none;background:none;color:var(--text3);font-size:14px;cursor:pointer;padding:2px;flex-shrink:0}
.sdiv{display:flex;align-items:center;gap:8px;margin:10px 0 6px}.sln{flex:1;height:.5px;background:var(--sep)}.slbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}

/* EXAM */
.exc{background:var(--stat);border-radius:14px;padding:12px;margin-bottom:8px;border:.5px solid var(--border);box-shadow:var(--s3);position:relative;overflow:hidden}
.exc::before{content:'';position:absolute;inset:0;background:var(--gl);pointer-events:none;border-radius:14px}
.exc-h{display:flex;align-items:center;gap:8px}
.exc-ic{width:32px;height:32px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--s1);border:.5px solid var(--sep)}
.exc-ic svg{width:16px;height:16px;stroke:var(--text2);stroke-width:1.7;fill:none}
.exc-inf{flex:1}.exc-subj{font-size:13px;font-weight:700}.exc-desc{font-size:10px;color:var(--text2);margin-top:1px}
.exc-cd{text-align:right}.exc-days{font-size:26px;font-weight:800;letter-spacing:-1px}.exc-lbl{font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase}
.exc-bar{margin-top:6px;height:3px;background:var(--accent-bg);border-radius:2px;overflow:hidden}.exc-fill{height:100%;border-radius:2px}.exc-past{opacity:.25}

/* FEHLSTUNDEN */
.fh-card{background:var(--stat);border-radius:13px;padding:11px;margin-bottom:7px;border:.5px solid var(--border);box-shadow:var(--s2);position:relative;overflow:hidden;display:flex;align-items:center;gap:8px}
.fh-card::before{content:'';position:absolute;inset:0;background:var(--gl);pointer-events:none;border-radius:13px}
.fh-info{flex:1}.fh-subj{font-size:12px;font-weight:600}.fh-det{font-size:10px;color:var(--text2)}.fh-date{font-size:9px;color:var(--text3)}
.fh-badge{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;flex-shrink:0}
.fh-e{background:rgba(46,125,50,.08);color:var(--green)}.fh-u{background:rgba(191,54,12,.08);color:var(--red)}

.empty{text-align:center;padding:30px 16px}
.empty svg{width:40px;height:40px;stroke:var(--text3);stroke-width:1;fill:none;margin-bottom:5px}
.empty-t{font-size:13px;font-weight:600;color:var(--text2)}.empty-h{font-size:11px;color:var(--text3);margin-top:2px}

/* FORMS / OVERLAY */
.fcard{background:var(--card);border-radius:16px;padding:14px;margin-bottom:8px;box-shadow:var(--s3);border:.5px solid var(--border);animation:fU .3s;position:relative;overflow:hidden}
.fcard::before{content:'';position:absolute;inset:0;background:var(--gl);pointer-events:none;border-radius:16px}
.fcard h3{font-size:14px;font-weight:700;margin-bottom:8px}
.flbl{display:block;font-size:10px;font-weight:600;color:var(--text2);margin:6px 0 2px}
.fsel,.finp{width:100%;padding:9px 10px;border-radius:10px;border:.5px solid var(--border);font-size:13px;font-family:inherit;background:var(--card2);color:var(--text);outline:none;box-shadow:inset 0 1px 3px rgba(0,0,0,.04);transition:all .3s}
.fsel:focus,.finp:focus{border-color:var(--accent);box-shadow:inset 0 1px 3px rgba(0,0,0,.04),0 0 0 3px var(--accent-bg)}
.f-acts{display:flex;gap:6px;margin-top:10px}
.btn-c{flex:1;padding:10px;border:none;border-radius:10px;background:var(--card2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:var(--s1)}.btn-c:active{transform:scale(.97)}
.btn-s{flex:1;padding:10px;border:none;border-radius:10px;background:var(--accent);color:var(--bg);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:var(--s2)}.btn-s:active{transform:scale(.97)}.btn-s:disabled{opacity:.2}

.ov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:flex-end;justify-content:center}.ov.show{display:flex}
.sht{background:var(--card);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:460px;max-height:75vh;overflow-y:auto;animation:shU .4s cubic-bezier(.32,1.4,.62,1);box-shadow:0 -8px 48px rgba(0,0,0,.2)}.sht h3{font-size:15px;font-weight:700;margin-bottom:10px}
@keyframes shU{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sht-hd{width:32px;height:3px;background:var(--text3);border-radius:2px;margin:0 auto 12px;opacity:.15}
.sht-cl{width:100%;padding:10px;border:none;border-radius:10px;background:var(--accent);color:var(--bg);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;box-shadow:var(--s2)}
.th-opt{display:flex;align-items:center;gap:10px;padding:9px;border-radius:11px;cursor:pointer;margin-bottom:3px;border:1.5px solid transparent;transition:all .2s}
.th-opt.active{border-color:var(--accent);background:var(--accent-bg)}
.th-sw{width:32px;height:32px;border-radius:8px;flex-shrink:0;box-shadow:var(--s1);position:relative;overflow:hidden}
.th-sw::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 3px,transparent 3px,transparent 6px)}
.th-inf{flex:1}.th-inf strong{font-size:12px;display:block}.th-inf span{font-size:10px;color:var(--text3)}

.chip-row{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.chip{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:var(--card2);color:var(--text2);border:.5px solid var(--border);cursor:pointer;transition:all .2s}
.chip.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.chip-add{border-style:dashed;color:var(--text3)}

input[type="file"]{display:none}
</style>
</head>
<body>

<div class="ov" id="ov-set" onclick="if(event.target===this)hideOv('set')"><div class="sht"><div class="sht-hd"></div><h3>Erscheinungsbild</h3><div id="thl"></div><button class="sht-cl" onclick="hideOv('set')">Fertig</button></div></div>
<div class="ov" id="ov-ex" onclick="if(event.target===this)hideOv('ex')"><div class="sht"><div class="sht-hd"></div><h3>Klausur eintragen</h3><label class="flbl">Fach</label><select class="fsel" id="ex-subj"></select><label class="flbl">Datum</label><input class="finp" id="ex-date" type="date"><label class="flbl">Thema</label><input class="finp" id="ex-topic" type="text" placeholder="z.B. Analysis"><div class="f-acts"><button class="btn-c" onclick="hideOv('ex')">Abbrechen</button><button class="btn-s" onclick="addEx()">Eintragen</button></div></div></div>
<div class="ov" id="ov-tt" onclick="if(event.target===this)hideOv('tt')"><div class="sht"><div class="sht-hd"></div><h3>Stunden eintragen</h3><label class="flbl">Fach</label><select class="fsel" id="tt-subj"></select><label class="flbl">Tag</label><select class="fsel" id="tt-day"><option value="0">Montag</option><option value="1">Dienstag</option><option value="2">Mittwoch</option><option value="3">Donnerstag</option><option value="4">Freitag</option></select><label class="flbl">Stunde</label><select class="fsel" id="tt-slot"></select><label class="flbl">Typ</label><select class="fsel" id="tt-type"><option value="single">Einzelstunde</option><option value="double">Doppelstunde</option><option value="free">Freistunde</option></select><label class="flbl">Raum</label><input class="finp" id="tt-room" type="text" placeholder="z.B. R204"><div class="f-acts"><button class="btn-c" onclick="hideOv('tt')">Abbrechen</button><button class="btn-s" onclick="addTT()">Eintragen</button></div></div></div>
<div class="ov" id="ov-fh" onclick="if(event.target===this)hideOv('fh')"><div class="sht"><div class="sht-hd"></div><h3>Fehlstunde eintragen</h3><label class="flbl">Fach</label><select class="fsel" id="fh-subj"></select><label class="flbl">Datum</label><input class="finp" id="fh-date" type="date"><label class="flbl">Lehrer</label><input class="finp" id="fh-teacher" type="text" placeholder="z.B. Herr Müller"><label class="flbl">Stunden</label><input class="finp" id="fh-hours" type="number" value="1" min="1" max="10"><label class="flbl">Status</label><select class="fsel" id="fh-status"><option value="e">Entschuldigt</option><option value="u">Unentschuldigt</option></select><label class="flbl">Grund</label><input class="finp" id="fh-reason" type="text" placeholder="z.B. Krank"><div class="f-acts"><button class="btn-c" onclick="hideOv('fh')">Abbrechen</button><button class="btn-s" onclick="addFH()">Eintragen</button></div></div></div>
<div class="ov" id="ov-untis" onclick="if(event.target===this)hideOv('untis')"><div class="sht"><div class="sht-hd"></div><h3>Untis Verbindung</h3><label class="flbl">Schule (Untis-Schulname)</label><input class="finp" id="u-school" type="text" placeholder="z.B. gym-musterstadt"><label class="flbl">Benutzername</label><input class="finp" id="u-user" type="text"><label class="flbl">Passwort</label><input class="finp" id="u-pass" type="password"><label class="flbl">Server</label><input class="finp" id="u-server" type="text" value="neilo.webuntis.com"><p id="u-st" style="font-size:10px;color:var(--text3);margin-top:6px"></p><div class="f-acts"><button class="btn-c" onclick="hideOv('untis')">Abbrechen</button><button class="btn-s" onclick="untisLogin()">Verbinden</button></div></div></div>

<input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(this)">

<script>
// CORRECT TIMESTAMPS: 45min lessons, 5min breaks, big breaks: 20/15/10/5 min after 2nd/4th/6th/8th
const TSTART=[
  [8,0],[8,50],    // 1-2 then 20min
  [9,55],[10,45],  // 3-4 then 15min
  [11,45],[12,35], // 5-6 then 10min
  [13,30],[14,20], // 7-8 then 5min
  [15,10],[16,0]   // 9-10
];
const TEND=TSTART.map(([h,m])=>{let nm=m+45;let nh=h;if(nm>=60){nh++;nm-=60}return[nh,nm]});
function tf(i){return String(TSTART[i][0]).padStart(2,'0')+':'+String(TSTART[i][1]).padStart(2,'0')}
function te(i){return String(TEND[i][0]).padStart(2,'0')+':'+String(TEND[i][1]).padStart(2,'0')}

const ALL_S=[{n:"Deutsch",ab:"DE"},{n:"Mathematik",ab:"MA"},{n:"Englisch",ab:"EN"},{n:"Französisch",ab:"FR"},{n:"Spanisch",ab:"SP"},{n:"Latein",ab:"LA"},{n:"Geschichte",ab:"GE"},{n:"Politik/Wirtschaft",ab:"PW"},{n:"Erdkunde",ab:"EK"},{n:"Physik",ab:"PH"},{n:"Chemie",ab:"CH"},{n:"Biologie",ab:"BI"},{n:"Informatik",ab:"IF"},{n:"Kunst",ab:"KU"},{n:"Musik",ab:"MU"},{n:"Sport",ab:"SP"},{n:"Religion",ab:"RE"},{n:"Ethik",ab:"ET"},{n:"Philosophie",ab:"PL"},{n:"Seminarfach",ab:"SF"}];
const DAYS=["Mo","Di","Mi","Do","Fr"];
const PER=[{id:"q11",l:"Q 1.1"},{id:"q12",l:"Q 1.2"},{id:"q21",l:"Q 2.1"},{id:"q22",l:"Q 2.2"}];
const PL={15:"1+",14:"1",13:"1-",12:"2+",11:"2",10:"2-",9:"3+",8:"3",7:"3-",6:"4+",5:"4",4:"4-",3:"5+",2:"5",1:"5-",0:"6"};
const WOODS=[{id:"none",n:"Kein Holz",d:"Monochrom",bg:"var(--card)"},{id:"walnut",n:"Walnuss",d:"Dunkles Edelholz",bg:"linear-gradient(135deg,#3e2519,#5d3a24)"},{id:"oak",n:"Eiche",d:"Helles Naturholz",bg:"linear-gradient(135deg,#c4a882,#b89b72)"},{id:"mahogany",n:"Mahagoni",d:"Tiefes Rotholz",bg:"linear-gradient(135deg,#4a1428,#6a2038)"},{id:"ebony",n:"Ebenholz",d:"Tiefschwarzes Holz",bg:"linear-gradient(135deg,#0a0808,#22201e)"},{id:"cherry",n:"Kirschbaum",d:"Warmes Rotbraun",bg:"linear-gradient(135deg,#8b4531,#b06650)"},{id:"teak",n:"Teak",d:"Goldenes Tropenholz",bg:"linear-gradient(135deg,#8a7040,#aa9060)"}];

function pc(p){if(p>=13)return"#2e7d32";if(p>=10)return"#558b2f";if(p>=7)return"#f57f17";if(p>=4)return"#e65100";return"#c62828"}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fd(d){return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}
function grt(){const h=new Date().getHours();return h<12?'Guten Morgen':h<17?'Guten Tag':'Guten Abend'}

// DATA
let hw=JSON.parse(localStorage.getItem('ss4hw')||'[]'),gr=JSON.parse(localStorage.getItem('ss4gr')||'[]'),tbl=JSON.parse(localStorage.getItem('ss4tt')||'[]'),exams=JSON.parse(localStorage.getItem('ss4ex')||'[]'),fehl=JSON.parse(localStorage.getItem('ss4fh')||'[]');
let mySubjects=JSON.parse(localStorage.getItem('ss4ms')||'[]'); // user's chosen subjects
let cP=localStorage.getItem('ss4p')||'q11',dk=localStorage.getItem('ss4dk')==='true',wd=localStorage.getItem('ss4wd')||'none';
let clockStyle=localStorage.getItem('ss4clk')||'digital';
let oS=null,tW=null,tO=null;

function sv(){localStorage.setItem('ss4hw',JSON.stringify(hw));localStorage.setItem('ss4gr',JSON.stringify(gr));localStorage.setItem('ss4tt',JSON.stringify(tbl));localStorage.setItem('ss4ex',JSON.stringify(exams));localStorage.setItem('ss4fh',JSON.stringify(fehl));localStorage.setItem('ss4ms',JSON.stringify(mySubjects));localStorage.setItem('ss4p',cP);localStorage.setItem('ss4dk',dk);localStorage.setItem('ss4wd',wd);localStorage.setItem('ss4clk',clockStyle)}

function gs(n){return ALL_S.find(s=>s.n===n)||{n,ab:n.substring(0,2).toUpperCase()}}

function aT(){document.documentElement.setAttribute('data-mode',dk?'dark':'light');document.documentElement.setAttribute('data-wood',wd);document.getElementById('dm-btn').innerHTML=dk?'<svg viewBox="0 0 24 24" stroke="var(--ht)" stroke-width="1.6" fill="none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>':'<svg viewBox="0 0 24 24" stroke="var(--ht)" stroke-width="1.6" fill="none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>'}
function tgDk(){dk=!dk;sv();aT()}
function showOv(id){document.getElementById('ov-'+id).classList.add('show');if(id==='set')rTL();popSels()}
function hideOv(id){document.getElementById('ov-'+id).classList.remove('show')}
function setWd(id){wd=id;sv();aT();rTL()}
function rTL(){document.getElementById('thl').innerHTML=WOODS.map(w=>`<div class="th-opt${wd===w.id?' active':''}" onclick="setWd('${w.id}')"><div class="th-sw" style="background:${w.bg}"></div><div class="th-inf"><strong>${w.n}</strong><span>${w.d}</span></div></div>`).join('')}
function sP(id){cP=id;oS=null;sv();rAll()}
function sTab(t){document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));document.querySelectorAll('.tc').forEach(c=>c.classList.toggle('active',c.id==='tab-'+t))}
function rAll(){rTT();rGR();rHW();rEX();rFH()}

function popSels(){
  const subjOpts=(mySubjects.length?mySubjects:ALL_S.map(s=>s.n)).map(n=>{const s=gs(n);return`<option value="${s.n}">${s.ab} — ${s.n}</option>`}).join('');
  const allOpts=ALL_S.map(s=>`<option value="${s.n}">${s.ab} — ${s.n}</option>`).join('');
  ['tt-subj'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=allOpts+'<option value="Freistunde">— Freistunde</option>'});
  ['ex-subj','fh-subj'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=subjOpts});
  const sl=document.getElementById('tt-slot');
  if(sl)sl.innerHTML=TSTART.map((_,i)=>`<option value="${i}">${i+1}. Stunde (${tf(i)}–${te(i)})</option>`).join('');
}

function addSubj(){const n=document.getElementById('new-subj').value.trim();if(!n)return;if(!mySubjects.includes(n)){mySubjects.push(n);sv();rGR();popSels()}hideOv('subj');document.getElementById('new-subj').value=''}

// CLOCK
let clockTimer;
function renderClock(){
  const now=new Date();const el=document.getElementById('clock-area');if(!el)return;
  if(clockStyle==='digital'){
    el.innerHTML=`<div class="clock-digital">${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}</div><div class="clock-label" onclick="toggleClock()">Stil wechseln</div>`;
  }else if(clockStyle==='analog'){
    const h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds();
    const hDeg=h*30+m*0.5,mDeg=m*6,sDeg=s*6;
    el.innerHTML=`<svg class="clock-analog" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="48" fill="none" stroke="var(--border)" stroke-width="1.5"/>
      ${[0,30,60,90,120,150,180,210,240,270,300,330].map(a=>`<line x1="${50+42*Math.sin(a*Math.PI/180)}" y1="${50-42*Math.cos(a*Math.PI/180)}" x2="${50+46*Math.sin(a*Math.PI/180)}" y2="${50-46*Math.cos(a*Math.PI/180)}" stroke="var(--text3)" stroke-width="${a%90===0?2:1}"/>`).join('')}
      <line x1="50" y1="50" x2="${50+25*Math.sin(hDeg*Math.PI/180)}" y2="${50-25*Math.cos(hDeg*Math.PI/180)}" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="${50+35*Math.sin(mDeg*Math.PI/180)}" y2="${50-35*Math.cos(mDeg*Math.PI/180)}" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round"/>

function calcAbiAvg(){
  let allAvgs=[];
  PER.forEach(per=>{
    mySubjects.forEach(n=>{
      const sg=gr.filter(g=>g.s===n&&g.p===per.id);
      const a=cA(sg);
      if(a!==null)allAvgs.push(a);

  return allAvgs.length?(allAvgs.reduce((a,b)=>a+b,0)/allAvgs.length).toFixed(1):null;

function getCurClass(){
  const cur=tbl.filter(t=>(!t.p||t.p===cP)&&!t.free);const now=new Date();const day=now.getDay()-1;
  if(day<0||day>4)return null;
  const mins=now.getHours()*60+now.getMinutes();
  for(let i=0;i<TSTART.length;i++){const st=TSTART[i][0]*60+TSTART[i][1];if(mins>=st&&mins<st+45){const e=cur.find(x=>x.day===day&&x.slot===i);if(e)return{...e,si:i,type:'now'}}}
  for(let i=0;i<TSTART.length;i++){const st=TSTART[i][0]*60+TSTART[i][1];if(st>mins){const e=cur.find(x=>x.day===day&&x.slot===i);if(e)return{...e,si:i,type:'next',in:st-mins}}}
  return null;
}

function cA(sg){if(!sg.length)return null;const w=sg.filter(g=>g.tp==='S'),o=sg.filter(g=>g.tp==='M');const wa=w.length?w.reduce((s,g)=>s+g.pt,0)/w.length:null;const oa=o.length?o.reduce((s,g)=>s+g.pt,0)/o.length:null;if(wa!==null&&oa!==null)return Math.round((wa+oa)/2*10)/10;return wa!==null?Math.round(wa*10)/10:oa!==null?Math.round(oa*10)/10:null}

  if(!o.length&&!d.length)h+=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p class="empty-t">Keine Aufgaben</p></div>`;
  else{h+='<div class="hgrid">';o.forEach(x=>{const s=gs(x.s);const ov=x.d&&new Date(x.d)<td;h+=`<div class="hwc"><div class="hwck" onclick="tDn(${x.id})"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="hwb"><div class="hwtp"><span class="htag">${s.ab}</span>${ov?'<span class="odtag">Überfällig</span>':''}</div><p class="hwtx">${esc(x.t)}</p>${x.d?`<p class="hwdu" style="color:${ov?'var(--red)':'var(--text3)'}">Fällig: ${fd(x.d)}</p>`:''}</div><button class="xbtn" onclick="dHW(${x.id})">×</button></div>`});h+='</div>';}
  if(d.length){h+=`<div class="sdiv"><span class="sln"></span><span class="slbl">Erledigt (${d.length})</span><span class="sln"></span></div>`;d.forEach(x=>{const s=gs(x.s);h+=`<div class="hwc done"><div class="hwck chk"><svg viewBox="0 0 24 24" stroke="var(--bg)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div><div class="hwb"><span class="htag" style="font-size:8px">${s.ab}</span><p class="hwtx str">${esc(x.t)}</p></div><button class="xbtn" onclick="dHW(${x.id})">×</button></div>`})}
  document.getElementById('tab-hw').innerHTML=h;
  const sel=document.getElementById('hw-s2');if(sel)sel.innerHTML=(mySubjects.length?mySubjects:ALL_S.map(s=>s.n)).map(n=>`<option value="${n}">${gs(n).ab} — ${n}</option>`).join('');
}
function tHwF(s){const f=document.getElementById('hwf'),b=document.getElementById('hwab');if(f)f.style.display=s?'block':'none';if(b)b.style.display=s?'none':'block';if(s)document.getElementById('hw-t')?.focus()}
function aHW(){const t=document.getElementById('hw-t')?.value.trim();if(!t)return;hw.unshift({id:Date.now(),s:document.getElementById('hw-s2').value,t,d:document.getElementById('hw-d')?.value||null,dn:false,p:cP});sv();rHW();rTT()}
function tDn(id){const i=hw.find(h=>h.id===id);if(i)i.dn=!i.dn;sv();rHW();rTT()}
function dHW(id){hw=hw.filter(h=>h.id!==id);sv();rHW();rTT()}

// EXAMS
function addEx(){const s=document.getElementById('ex-subj').value,d=document.getElementById('ex-date').value,t=document.getElementById('ex-topic').value.trim();if(!d)return;exams.push({id:Date.now(),s,d,t,p:cP});sv();hideOv('ex');rAll()}
function dEX(id){exams=exams.filter(e=>e.id!==id);sv();rAll()}
function rEX(){const cur=exams.filter(e=>e.p===cP).sort((a,b)=>new Date(a.d)-new Date(b.d));const td=new Date(new Date().toDateString());
  let h=`<div class="p-row">${PER.map(p=>`<button class="p-btn${cP===p.id?' active':''}" onclick="sP('${p.id}')">${p.l}</button>`).join('')}</div>`;
  h+=`<button class="act-btn" style="width:100%;margin-bottom:8px" onclick="showOv('ex')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Klausur eintragen</button>`;
  if(!cur.length)h+=`<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p class="empty-t">Keine Klausuren</p></div>`;
  else{const up=cur.filter(e=>new Date(e.d)>=td),past=cur.filter(e=>new Date(e.d)<td);
    if(up.length){h+=`<div class="sec-t">Anstehend</div>`;up.forEach(e=>{const s=gs(e.s),diff=Math.ceil((new Date(e.d)-td)/864e5),isT=diff===0;let col=diff<=2?'var(--red)':diff<=7?'var(--amber)':'var(--green)';const pct=Math.max(0,Math.min(100,100-diff/30*100));h+=`<div class="exc${isT?' exc-today':''}"><div class="exc-h"><div class="exc-ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="exc-inf"><div class="exc-subj">${s.n}</div><div class="exc-desc">${e.t?esc(e.t):fd(e.d)}</div></div><div class="exc-cd"><div class="exc-days" style="color:${col}">${isT?'!':diff}</div><div class="exc-lbl">${isT?'Heute':diff===1?'Tag':'Tage'}</div></div><button class="xbtn" onclick="dEX(${e.id})">×</button></div><div class="exc-bar"><div class="exc-fill" style="width:${pct}%;background:${col==='var(--green)'?'var(--text3)':col}"></div></div></div>`})}
    if(past.length){h+=`<div class="sec-t">Vergangen</div>`;past.forEach(e=>{const s=gs(e.s);h+=`<div class="exc exc-past"><div class="exc-h"><div class="exc-ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="exc-inf"><div class="exc-subj">${s.n}</div><div class="exc-desc">${e.t||''} · ${fd(e.d)}</div></div><button class="xbtn" onclick="dEX(${e.id})">×</button></div></div>`})}}
  document.getElementById('tab-ex').innerHTML=h}

// FEHLSTUNDEN
function addFH(){const s=document.getElementById('fh-subj').value,d=document.getElementById('fh-date').value,t=document.getElementById('fh-teacher').value.trim(),hrs=+document.getElementById('fh-hours').value||1,st=document.getElementById('fh-status').value,r=document.getElementById('fh-reason').value.trim();if(!d)return;fehl.push({id:Date.now(),s,d,t,h:hrs,st,r,p:cP});sv();hideOv('fh');rAll()}
function dFH(id){fehl=fehl.filter(f=>f.id!==id);sv();rAll()}
function rFH(){
  const cur=fehl.filter(f=>!f.p||f.p===cP).sort((a,b)=>new Date(b.d)-new Date(a.d));
  const total=cur.reduce((s,f)=>s+(f.h||1),0);
  const ent=cur.filter(f=>f.st==='e').reduce((s,f)=>s+(f.h||1),0);
  const unent=cur.filter(f=>f.st==='u').reduce((s,f)=>s+(f.h||1),0);

  let h=`<div class="p-row">${PER.map(p=>`<button class="p-btn${cP===p.id?' active':''}" onclick="sP('${p.id}')">${p.l}</button>`).join('')}</div>`;
  h+=`<button class="act-btn" style="width:100%;margin-bottom:8px" onclick="showOv('fh')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Fehlstunde eintragen</button>`;

  if(total){h+=`<div class="c3" style="display:flex;gap:16px;justify-content:center;text-align:center;padding:14px">
    <div><div style="font-size:22px;font-weight:800">${total}</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Gesamt</div></div>
    <div><div style="font-size:22px;font-weight:800;color:var(--green)">${ent}</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Entsch.</div></div>
    <div><div style="font-size:22px;font-weight:800;color:var(--red)">${unent}</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Unentsch.</div></div>
  </div>`}

  if(!cur.length)h+=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/></svg><p class="empty-t">Keine Fehlstunden</p></div>`;
  else{cur.forEach(f=>{const s=gs(f.s);h+=`<div class="fh-card"><div class="fh-info"><div class="fh-subj">${s.n}${f.t?' · '+esc(f.t):''}</div><div class="fh-det">${f.h||1} Stunde${(f.h||1)>1?'n':''}${f.r?' · '+esc(f.r):''}</div><div class="fh-date">${fd(f.d)}</div></div><span class="fh-badge ${f.st==='e'?'fh-e':'fh-u'}">${f.st==='e'?'Entsch.':'Unentsch.'}</span><button class="xbtn" onclick="dFH(${f.id})">×</button></div>`})}
  document.getElementById('tab-fh').innerHTML=h;
}

aT();popSels();rAll();
clockTimer=setInterval(renderClock,1000);
</script>
</body>
</html>
