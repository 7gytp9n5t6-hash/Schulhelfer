<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SchulHelfer — Oberstufe im Griff</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f6f1;
    --card: #ffffff;
    --text: #1a1a2e;
    --text2: #5a5a7a;
    --text3: #9a9ab0;
    --border: #e8e6e1;
    --accent: #4338ca;
    --accent2: #6d5dfc;
    --accent-bg: #eef0ff;
    --red: #e53e3e;
    --green: #22c55e;
    --yellow: #eab308;
    --orange: #f97316;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .app {
    max-width: 540px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #312e81 0%, #4338ca 40%, #6d5dfc 100%);
    padding: 36px 24px 30px;
    border-radius: 0 0 32px 32px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%; left: -20%;
    width: 140%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-content { position: relative; text-align: center; }
  .header-logo { font-size: 44px; display: block; margin-bottom: 4px; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.25)); }
  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 30px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
  }
  .header p { font-size: 14px; color: rgba(255,255,255,0.65); font-weight: 500; margin-top: 2px; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 16px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
  }
  .tab-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 11px 10px;
    border: none;
    border-radius: 14px;
    background: var(--card);
    color: var(--text2);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(.4,0,.2,1);
    box-shadow: var(--shadow);
    font-family: inherit;
    position: relative;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, #4338ca, #6d5dfc);
    color: #fff;
    box-shadow: 0 6px 24px rgba(67,56,202,0.35);
    transform: translateY(-1px);
  }
  .tab-emoji { font-size: 17px; }
  .badge {
    position: absolute;
    top: -5px; right: -5px;
    background: var(--red);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    border-radius: 10px;
    padding: 1px 7px;
    min-width: 18px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(229,62,62,0.4);
  }

  /* Content */
  .content { padding: 16px 16px 40px; flex: 1; }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Add Button */
  .add-btn {
    width: 100%;
    padding: 15px;
    border: 2.5px dashed #c7d2fe;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.5);
    color: var(--accent);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 14px;
    font-family: inherit;
  }
  .add-btn:hover { background: var(--accent-bg); border-color: var(--accent); }

  /* Form Card */
  .form-card {
    background: var(--card);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.08);
    border: 1px solid rgba(67,56,202,0.1);
    animation: fadeUp 0.25s ease;
  }
  .form-card h3 { font-size: 17px; font-weight: 800; margin-bottom: 14px; color: var(--text); }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin: 12px 0 5px;
  }
  .form-select, .form-input {
    width: 100%;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    font-size: 14px;
    font-family: inherit;
    background: #fafaf8;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-select:focus, .form-input:focus { border-color: var(--accent); }
  .form-actions { display: flex; gap: 8px; margin-top: 18px; }
  .btn-cancel {
    flex: 1; padding: 11px; border: 1.5px solid var(--border); border-radius: 12px;
    background: var(--card); color: var(--text2); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-submit {
    flex: 1; padding: 11px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #4338ca, #6d5dfc); color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(67,56,202,0.3); transition: all 0.15s;
  }
  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(67,56,202,0.4); }

  /* Type buttons */
  .type-row { display: flex; gap: 6px; }
  .type-btn {
    flex: 1; padding: 9px; border: 1.5px solid var(--border); border-radius: 10px;
    background: #fafaf8; font-size: 13px; font-weight: 600; color: var(--text2);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .type-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }

  /* Points slider */
  .points-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .points-label { font-size: 12px; font-weight: 700; color: var(--text3); min-width: 18px; text-align: center; }
  .points-slider {
    flex: 1; height: 6px; border-radius: 4px; appearance: auto;
    outline: none; cursor: pointer; accent-color: var(--accent);
  }
  .quick-points { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .quick-btn {
    width: 40px; height: 34px; border: none; border-radius: 9px;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }

  /* Homework card */
  .hw-card {
    display: flex; align-items: flex-start; gap: 11px;
    background: var(--card); border-radius: var(--radius); padding: 14px;
    margin-bottom: 8px; box-shadow: var(--shadow); transition: all 0.2s;
  }
  .hw-card.done { opacity: 0.5; }
  .hw-check {
    width: 24px; height: 24px; border-radius: 8px; border: 2.5px solid;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; margin-top: 1px; transition: all 0.2s;
    font-size: 13px; font-weight: 700; color: transparent;
  }
  .hw-check.checked { color: #fff; }
  .hw-body { flex: 1; min-width: 0; }
  .hw-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
  .subject-tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 9px; border-radius: 7px; font-size: 12px; font-weight: 700;
    white-space: nowrap;
  }
  .overdue-tag {
    font-size: 11px; font-weight: 700; color: var(--red); background: #fff5f5;
    padding: 2px 7px; border-radius: 6px;
  }
  .hw-text { font-size: 14px; color: var(--text); line-height: 1.45; word-break: break-word; margin: 2px 0; }
  .hw-text.strike { text-decoration: line-through; color: var(--text2); }
  .hw-due { font-size: 12px; font-weight: 500; margin-top: 2px; }
  .del-btn {
    border: none; background: none; color: #d1d5db; font-size: 17px;
    cursor: pointer; padding: 4px; line-height: 1; border-radius: 8px;
    transition: color 0.15s; flex-shrink: 0;
  }
  .del-btn:hover { color: var(--red); }

  /* Section divider */
  .section-div {
    display: flex; align-items: center; gap: 10px; margin: 18px 0 10px;
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-label {
    font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.6px;
  }

  /* Average Card */
  .avg-card {
    background: linear-gradient(135deg, #fff 0%, #f0eeff 100%);
    border-radius: 22px; padding: 22px; margin-bottom: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06); border: 1px solid rgba(67,56,202,0.08);
    text-align: center;
  }
  .avg-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
  .avg-value { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 900; letter-spacing: -1.5px; display: block; margin: 2px 0; }
  .avg-note { font-size: 13px; color: var(--text2); font-weight: 500; }

  /* Subject grid */
  .subj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 8px; margin-bottom: 14px; }
  .subj-card {
    background: var(--card); border-radius: 14px; padding: 13px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    box-shadow: var(--shadow);
  }
  .subj-emoji { font-size: 22px; }
  .subj-name { font-size: 12px; font-weight: 600; color: var(--text2); }
  .subj-val { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .subj-sub { font-size: 11px; color: var(--text3); font-weight: 500; }

  /* Grade card */
  .grade-card {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border-radius: var(--radius); padding: 13px 14px;
    margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .grade-circle {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 54px; height: 54px; border-radius: 15px; flex-shrink: 0;
  }
  .grade-num { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 900; line-height: 1; }
  .grade-sub { font-size: 10px; font-weight: 600; opacity: 0.8; }
  .grade-body { flex: 1; min-width: 0; }
  .grade-top { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  .grade-type { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; }
  .grade-note-text { font-size: 13px; color: var(--text2); margin: 2px 0; }
  .grade-date { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Empty state */
  .empty { text-align: center; padding: 44px 20px; }
  .empty-icon { font-size: 52px; display: block; margin-bottom: 8px; }
  .empty-text { font-size: 16px; font-weight: 600; color: var(--text2); }
  .empty-hint { font-size: 13px; color: var(--text3); margin-top: 4px; }

  /* Responsive */
  @media (max-width: 400px) {
    .header { padding: 28px 16px 24px; }
    .header h1 { font-size: 26px; }
    .content { padding: 14px 12px 32px; }
    .subj-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-content">
      <span class="header-logo">🎓</span>
      <h1>SchulHelfer</h1>
      <p>Oberstufe im Griff</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="homework" onclick="switchTab('homework')">
      <span class="tab-emoji">📋</span> Hausaufgaben
      <span class="badge" id="hw-badge" style="display:none">0</span>
    </button>
    <button class="tab-btn" data-tab="grades" onclick="switchTab('grades')">
      <span class="tab-emoji">📊</span> Noten
    </button>
  </div>

  <div class="content">
    <!-- HOMEWORK TAB -->
    <div class="tab-content active" id="tab-homework">
      <button class="add-btn" id="hw-add-btn" onclick="toggleHwForm(true)">+ Neue Hausaufgabe</button>
      <div class="form-card" id="hw-form" style="display:none">
        <h3>Neue Hausaufgabe</h3>
        <label class="form-label">Fach</label>
        <select class="form-select" id="hw-subject"></select>
        <label class="form-label">Aufgabe</label>
        <input class="form-input" id="hw-text" type="text" placeholder="z.B. S. 42 Nr. 3a-d">
        <label class="form-label">Fällig am (optional)</label>
        <input class="form-input" id="hw-date" type="date">
        <div class="form-actions">
          <button class="btn-cancel" onclick="toggleHwForm(false)">Abbrechen</button>
          <button class="btn-submit" onclick="addHomework()">Hinzufügen</button>
        </div>
      </div>
      <div id="hw-open-list"></div>
      <div id="hw-done-section"></div>
    </div>

    <!-- GRADES TAB -->
    <div class="tab-content" id="tab-grades">
      <div id="avg-overview"></div>
      <div id="subj-overview"></div>
      <button class="add-btn" id="gr-add-btn" onclick="toggleGrForm(true)">+ Neue Note eintragen</button>
      <div class="form-card" id="gr-form" style="display:none">
        <h3>Note eintragen</h3>
        <label class="form-label">Fach</label>
        <select class="form-select" id="gr-subject"></select>
        <label class="form-label">Art</label>
        <div class="type-row" id="gr-types"></div>
        <label class="form-label" id="gr-points-label">Punkte: <strong>10</strong> (2-)</label>
        <div class="points-row">
          <span class="points-label">0</span>
          <input class="points-slider" id="gr-slider" type="range" min="0" max="15" value="10" oninput="updateSlider()">
          <span class="points-label">15</span>
        </div>
        <div class="quick-points" id="gr-quick"></div>
        <label class="form-label">Anmerkung (optional)</label>
        <input class="form-input" id="gr-note" type="text" placeholder="z.B. Gedichtanalyse">
        <div class="form-actions">
          <button class="btn-cancel" onclick="toggleGrForm(false)">Abbrechen</button>
          <button class="btn-submit" onclick="addGrade()">Eintragen</button>
        </div>
      </div>
      <div id="grade-list"></div>
    </div>
  </div>
</div>

<script>
const SUBJECTS = [
  { name: "Deutsch", emoji: "📖", color: "#c0392b" },
  { name: "Mathematik", emoji: "📐", color: "#2563eb" },
  { name: "Englisch", emoji: "🇬🇧", color: "#7c3aed" },
  { name: "Französisch", emoji: "🇫🇷", color: "#1d4ed8" },
  { name: "Spanisch", emoji: "🇪🇸", color: "#ca8a04" },
  { name: "Latein", emoji: "🏛️", color: "#92400e" },
  { name: "Geschichte", emoji: "⏳", color: "#a0522d" },
  { name: "Politik/Wirtschaft", emoji: "🏛️", color: "#1e40af" },
  { name: "Erdkunde", emoji: "🌍", color: "#15803d" },
  { name: "Physik", emoji: "⚛️", color: "#0369a1" },
  { name: "Chemie", emoji: "🧪", color: "#7e22ce" },
  { name: "Biologie", emoji: "🧬", color: "#16a34a" },
  { name: "Informatik", emoji: "💻", color: "#0d9488" },
  { name: "Kunst", emoji: "🎨", color: "#dc2626" },
  { name: "Musik", emoji: "🎵", color: "#9333ea" },
  { name: "Sport", emoji: "⚽", color: "#ea580c" },
  { name: "Religion", emoji: "✝️", color: "#6b7280" },
  { name: "Ethik", emoji: "🤔", color: "#475569" },
  { name: "Philosophie", emoji: "💭", color: "#64748b" },
  { name: "Seminarfach", emoji: "📝", color: "#334155" },
];

const POINT_LABELS = {
  15:"1+",14:"1",13:"1-",12:"2+",11:"2",10:"2-",
  9:"3+",8:"3",7:"3-",6:"4+",5:"4",4:"4-",
  3:"5+",2:"5",1:"5-",0:"6"
};

function getPointColor(p) {
  if (p >= 13) return "#16a34a";
  if (p >= 10) return "#65a30d";
  if (p >= 7) return "#ca8a04";
  if (p >= 4) return "#ea580c";
  return "#dc2626";
}

function getSubject(name) {
  return SUBJECTS.find(s => s.name === name) || SUBJECTS[0];
}

// Data
let homework = JSON.parse(localStorage.getItem('sh-homework') || '[]');
let grades = JSON.parse(localStorage.getItem('sh-grades') || '[]');
let grType = 'Klausur';
let grPoints = 10;

function save() {
  localStorage.setItem('sh-homework', JSON.stringify(homework));
  localStorage.setItem('sh-grades', JSON.stringify(grades));
}

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
}

// Populate selects
function populateSelects() {
  ['hw-subject', 'gr-subject'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = SUBJECTS.map(s => `<option value="${s.name}">${s.emoji} ${s.name}</option>`).join('');
  });
}

// HW Form
function toggleHwForm(show) {
  document.getElementById('hw-form').style.display = show ? 'block' : 'none';
  document.getElementById('hw-add-btn').style.display = show ? 'none' : 'block';
  if (show) document.getElementById('hw-text').focus();
}

function addHomework() {
  const text = document.getElementById('hw-text').value.trim();
  if (!text) return;
  homework.unshift({
    id: Date.now(),
    subject: document.getElementById('hw-subject').value,
    text,
    due: document.getElementById('hw-date').value || null,
    done: false
  });
  save();
  document.getElementById('hw-text').value = '';
  document.getElementById('hw-date').value = '';
  toggleHwForm(false);
  renderHomework();
}

function toggleDone(id) {
  const item = homework.find(h => h.id === id);
  if (item) item.done = !item.done;
  save();
  renderHomework();
}

function removeHomework(id) {
  homework = homework.filter(h => h.id !== id);
  save();
  renderHomework();
}

function renderHomework() {
  const open = homework.filter(h => !h.done);
  const done = homework.filter(h => h.done);
  const today = new Date(new Date().toDateString());

  // Badge
  const badge = document.getElementById('hw-badge');
  badge.textContent = open.length;
  badge.style.display = open.length > 0 ? 'block' : 'none';

  // Open list
  document.getElementById('hw-open-list').innerHTML = open.length === 0 && done.length === 0
    ? `<div class="empty"><span class="empty-icon">📚</span><p class="empty-text">Keine Hausaufgaben eingetragen.</p><p class="empty-hint">Tippe auf "+ Neue Hausaufgabe" um loszulegen!</p></div>`
    : open.map(h => {
      const s = getSubject(h.subject);
      const overdue = h.due && new Date(h.due) < today;
      return `<div class="hw-card">
        <div class="hw-check" style="border-color:${s.color}" onclick="toggleDone(${h.id})"></div>
        <div class="hw-body">
          <div class="hw-top">
            <span class="subject-tag" style="background:${s.color}15;color:${s.color}">${s.emoji} ${s.name}</span>
            ${overdue ? '<span class="overdue-tag">Überfällig!</span>' : ''}
          </div>
          <p class="hw-text">${esc(h.text)}</p>
          ${h.due ? `<p class="hw-due" style="color:${overdue ? 'var(--red)' : 'var(--text3)'}">Fällig: ${formatDate(h.due)}</p>` : ''}
        </div>
        <button class="del-btn" onclick="removeHomework(${h.id})">✕</button>
      </div>`;
    }).join('');

  // Done section
  document.getElementById('hw-done-section').innerHTML = done.length === 0 ? '' :
    `<div class="section-div"><span class="section-line"></span><span class="section-label">Erledigt (${done.length})</span><span class="section-line"></span></div>` +
    done.map(h => {
      const s = getSubject(h.subject);
      return `<div class="hw-card done">
        <div class="hw-check checked" style="border-color:${s.color};background:${s.color}" onclick="toggleDone(${h.id})">✓</div>
        <div class="hw-body">
          <span class="subject-tag" style="background:${s.color}15;color:${s.color};font-size:11px">${s.emoji} ${s.name}</span>
          <p class="hw-text strike">${esc(h.text)}</p>
        </div>
        <button class="del-btn" onclick="removeHomework(${h.id})">✕</button>
      </div>`;
    }).join('');
}

// Grade form
function toggleGrForm(show) {
  document.getElementById('gr-form').style.display = show ? 'block' : 'none';
  document.getElementById('gr-add-btn').style.display = show ? 'none' : 'block';
}

function setupGradeForm() {
  // Type buttons
  document.getElementById('gr-types').innerHTML = ['Klausur','Mündlich','Sonstige'].map(t =>
    `<button class="type-btn${grType === t ? ' active' : ''}" onclick="setGrType('${t}')">${t}</button>`
  ).join('');

  // Quick points
  document.getElementById('gr-quick').innerHTML = [15,13,11,9,7,5,3,0].map(p =>
    `<button class="quick-btn" style="background:${grPoints === p ? getPointColor(p) : '#f3f4f6'};color:${grPoints === p ? '#fff' : '#374151'}" onclick="setQuickPoints(${p})">${p}</button>`
  ).join('');
}

function setGrType(t) { grType = t; setupGradeForm(); }
function setQuickPoints(p) { grPoints = p; document.getElementById('gr-slider').value = p; updateSlider(); }

function updateSlider() {
  grPoints = Number(document.getElementById('gr-slider').value);
  document.getElementById('gr-points-label').innerHTML = `Punkte: <strong>${grPoints}</strong> (${POINT_LABELS[grPoints]})`;
  setupGradeForm();
}

function addGrade() {
  grades.unshift({
    id: Date.now(),
    subject: document.getElementById('gr-subject').value,
    points: grPoints,
    type: grType,
    note: document.getElementById('gr-note').value.trim(),
    date: new Date().toISOString().slice(0, 10)
  });
  save();
  document.getElementById('gr-note').value = '';
  toggleGrForm(false);
  renderGrades();
}

function removeGrade(id) {
  grades = grades.filter(g => g.id !== id);
  save();
  renderGrades();
}

function renderGrades() {
  // Average overview
  if (grades.length > 0) {
    const avg = (grades.reduce((s, g) => s + g.points, 0) / grades.length).toFixed(1);
    document.getElementById('avg-overview').innerHTML = `
      <div class="avg-card">
        <span class="avg-label">Gesamtschnitt</span>
        <span class="avg-value" style="color:${getPointColor(Math.round(avg))}">${avg} Punkte</span>
        <span class="avg-note">≈ Note ${POINT_LABELS[Math.round(avg)]} · ${grades.length} Einträge</span>
      </div>`;
  } else {
    document.getElementById('avg-overview').innerHTML = '';
  }

  // Per-subject
  const bySubj = {};
  grades.forEach(g => { (bySubj[g.subject] = bySubj[g.subject] || []).push(g.points); });

  if (Object.keys(bySubj).length > 0) {
    document.getElementById('subj-overview').innerHTML = `<div class="subj-grid">${
      Object.entries(bySubj).map(([name, pts]) => {
        const avg = (pts.reduce((a, b) => a + b, 0) / pts.length).toFixed(1);
        const s = getSubject(name);
        return `<div class="subj-card">
          <span class="subj-emoji">${s.emoji}</span>
          <span class="subj-name">${s.name}</span>
          <span class="subj-val" style="color:${getPointColor(Math.round(avg))}">${avg}</span>
          <span class="subj-sub">${pts.length}× · ≈${POINT_LABELS[Math.round(avg)]}</span>
        </div>`;
      }).join('')
    }</div>`;
  } else {
    document.getElementById('subj-overview').innerHTML = '';
  }

  // Grade list
  document.getElementById('grade-list').innerHTML = grades.length === 0
    ? `<div class="empty"><span class="empty-icon">📊</span><p class="empty-text">Noch keine Noten eingetragen.</p><p class="empty-hint">Trage deine Punkte ein, um deinen Schnitt zu sehen!</p></div>`
    : grades.map(g => {
      const s = getSubject(g.subject);
      return `<div class="grade-card">
        <div class="grade-circle" style="background:${getPointColor(g.points)}15;color:${getPointColor(g.points)}">
          <span class="grade-num">${g.points}</span>
          <span class="grade-sub">${POINT_LABELS[g.points]}</span>
        </div>
        <div class="grade-body">
          <div class="grade-top">
            <span class="subject-tag" style="background:${s.color}15;color:${s.color}">${s.emoji} ${s.name}</span>
            <span class="grade-type">${g.type}</span>
          </div>
          ${g.note ? `<p class="grade-note-text">${esc(g.note)}</p>` : ''}
          <p class="grade-date">${formatDate(g.date)}</p>
        </div>
        <button class="del-btn" onclick="removeGrade(${g.id})">✕</button>
      </div>`;
    }).join('');
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Enter key support
document.getElementById('hw-text').addEventListener('keydown', e => { if (e.key === 'Enter') addHomework(); });
document.getElementById('gr-note').addEventListener('keydown', e => { if (e.key === 'Enter') addGrade(); });

// Init
populateSelects();
setupGradeForm();
updateSlider();
renderHomework();
renderGrades();
</script>
</body>
</html>
