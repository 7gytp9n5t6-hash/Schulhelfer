<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SchulHelfer — Oberstufe im Griff</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&family=Playfair+Display:wght@700;800;900&family=Space+Mono:wght@400;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ===================== THEME SYSTEM ===================== */
:root {
  /* Base sizing */
  --app-max: min(100vw, 580px);
  --pad: clamp(12px, 3vw, 20px);
  --fs-xs: clamp(10px, 2.2vw, 11px);
  --fs-sm: clamp(11px, 2.5vw, 12px);
  --fs-base: clamp(13px, 3vw, 14px);
  --fs-md: clamp(14px, 3.2vw, 15px);
  --fs-lg: clamp(16px, 3.5vw, 17px);
  --fs-xl: clamp(24px, 6vw, 28px);
  --fs-hero: clamp(30px, 8vw, 36px);
  --radius: clamp(12px, 3vw, 16px);
  --radius-lg: clamp(16px, 4vw, 22px);
  --trans: 0.45s cubic-bezier(0.4, 0, 0.2, 1);

  /* Default theme: Indigo */
  --bg: #f8f6f1; --bg2: #efece6; --card: #ffffff; --text: #1a1a2e; --text2: #5a5a7a;
  --text3: #9a9ab0; --border: #e8e6e1; --accent: #4338ca; --accent2: #6d5dfc;
  --accent-bg: #eef0ff; --red: #e53e3e; --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --hdr1: #312e81; --hdr2: #4338ca; --hdr3: #6d5dfc;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-head: 'Outfit', sans-serif;
  --card-blur: none; --card-border: transparent; --anim-style: smooth;
}

/* ---- THEME: Indigo (default) ---- */
[data-theme-base="indigo"] {
  --bg:#f8f6f1;--bg2:#efece6;--card:#fff;--text:#1a1a2e;--text2:#5a5a7a;--text3:#9a9ab0;
  --border:#e8e6e1;--accent:#4338ca;--accent2:#6d5dfc;--accent-bg:#eef0ff;
  --hdr1:#312e81;--hdr2:#4338ca;--hdr3:#6d5dfc;--shadow:0 2px 12px rgba(0,0,0,0.06);
  --font-body:'DM Sans',-apple-system,sans-serif;--font-head:'Outfit',sans-serif;
  --card-blur:none;--card-border:transparent;
}
[data-theme-base="indigo"][data-mode="dark"] {
  --bg:#0f0e1a;--bg2:#161525;--card:#1c1b2e;--text:#e8e8f0;--text2:#a0a0b8;--text3:#6a6a82;
  --border:#2a2a3c;--accent:#7c6dfc;--accent2:#9b8fff;--accent-bg:#252240;
  --hdr1:#14132a;--hdr2:#252260;--hdr3:#3d38a0;--shadow:0 2px 16px rgba(0,0,0,0.35);
}

/* ---- THEME: Forest ---- */
[data-theme-base="forest"] {
  --bg:#f4f7f2;--bg2:#e8ede5;--card:#fff;--text:#1a2e1a;--text2:#4a6a4a;--text3:#8aa08a;
  --border:#d5e0d2;--accent:#2d6a4f;--accent2:#40916c;--accent-bg:#e8f5e9;
  --hdr1:#1b4332;--hdr2:#2d6a4f;--hdr3:#52b788;--shadow:0 2px 12px rgba(0,40,0,0.06);
  --font-body:'Quicksand',-apple-system,sans-serif;--font-head:'Quicksand',sans-serif;
  --card-blur:none;--card-border:transparent;
}
[data-theme-base="forest"][data-mode="dark"] {
  --bg:#0d1a12;--bg2:#132218;--card:#1a2e20;--text:#d8ecd8;--text2:#90b090;--text3:#5a7a5a;
  --border:#2a3e2a;--accent:#52b788;--accent2:#74c69d;--accent-bg:#1a3a25;
  --hdr1:#0a1410;--hdr2:#1a3a25;--hdr3:#2d6a4f;--shadow:0 2px 16px rgba(0,0,0,0.4);
}

/* ---- THEME: Rose ---- */
[data-theme-base="rose"] {
  --bg:#fef7f4;--bg2:#fceee8;--card:#fff;--text:#2e1a24;--text2:#7a5a6a;--text3:#b09aa5;
  --border:#f0ddd5;--accent:#b5446e;--accent2:#d76d8f;--accent-bg:#fde8ef;
  --hdr1:#6b213f;--hdr2:#b5446e;--hdr3:#d76d8f;--shadow:0 2px 12px rgba(100,0,40,0.06);
  --font-body:'DM Sans',-apple-system,sans-serif;--font-head:'Playfair Display',serif;
  --card-blur:none;--card-border:transparent;
}
[data-theme-base="rose"][data-mode="dark"] {
  --bg:#1a0f14;--bg2:#25161e;--card:#2e1c26;--text:#f0e0e8;--text2:#c098a8;--text3:#7a5a6a;
  --border:#3e2a34;--accent:#d76d8f;--accent2:#e890aa;--accent-bg:#3a1a2a;
  --hdr1:#1a0a12;--hdr2:#4a1a30;--hdr3:#7a3050;--shadow:0 2px 16px rgba(0,0,0,0.4);
}

/* ---- THEME: Cyber ---- */
[data-theme-base="cyber"] {
  --bg:#f0f4f8;--bg2:#e2e8f0;--card:#fff;--text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f0;--accent:#0ea5e9;--accent2:#38bdf8;--accent-bg:#e0f2fe;
  --hdr1:#0c1220;--hdr2:#0c4a6e;--hdr3:#0ea5e9;--shadow:0 2px 12px rgba(0,100,180,0.06);
  --font-body:'Space Mono',monospace;--font-head:'Space Mono',monospace;
  --card-blur:none;--card-border:transparent;
}
[data-theme-base="cyber"][data-mode="dark"] {
  --bg:#080c14;--bg2:#0c1220;--card:#111827;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --border:#1e293b;--accent:#38bdf8;--accent2:#7dd3fc;--accent-bg:#0c2a4a;
  --hdr1:#060a10;--hdr2:#0a1a30;--hdr3:#0c4a6e;--shadow:0 2px 16px rgba(0,0,0,0.5);
}

/* ---- THEME: Sunset ---- */
[data-theme-base="sunset"] {
  --bg:#fdf8f0;--bg2:#faf0e2;--card:#fff;--text:#2e1e0e;--text2:#7a6040;--text3:#b0a080;
  --border:#efe0cc;--accent:#d97706;--accent2:#f59e0b;--accent-bg:#fef3c7;
  --hdr1:#78350f;--hdr2:#b45309;--hdr3:#f59e0b;--shadow:0 2px 12px rgba(100,60,0,0.06);
  --font-body:'DM Sans',-apple-system,sans-serif;--font-head:'Outfit',sans-serif;
  --card-blur:none;--card-border:transparent;
}
[data-theme-base="sunset"][data-mode="dark"] {
  --bg:#14100a;--bg2:#1e1810;--card:#28201a;--text:#f0e8d8;--text2:#c0a880;--text3:#7a6840;
  --border:#3a3020;--accent:#f59e0b;--accent2:#fbbf24;--accent-bg:#3a2a10;
  --hdr1:#100a05;--hdr2:#3a2508;--hdr3:#78350f;--shadow:0 2px 16px rgba(0,0,0,0.45);
}

/* ===================== BASE STYLES ===================== */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  transition: background var(--trans), color var(--trans);
}

.app {
  max-width: var(--app-max);
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ===================== HEADER ===================== */
.header {
  background: linear-gradient(135deg, var(--hdr1) 0%, var(--hdr2) 40%, var(--hdr3) 100%);
  padding: clamp(24px,5vw,36px) var(--pad) clamp(20px,4vw,28px);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  position: relative; overflow: hidden;
  transition: background var(--trans);
}
.header::before {
  content:''; position:absolute; top:-50%; left:-20%; width:140%; height:200%;
  background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,0.08)0%,transparent 60%);
  pointer-events:none;
}
.header-content { position:relative; text-align:center; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.dark-toggle, .theme-toggle {
  background:rgba(255,255,255,0.15); border:none; border-radius:20px;
  padding:6px 12px; color:#fff; font-size:clamp(14px,3.5vw,18px); cursor:pointer;
  transition:background 0.2s, transform 0.3s; font-family:inherit;
}
.dark-toggle:active, .theme-toggle:active { transform:scale(0.9); }
.header-logo { font-size:clamp(32px,8vw,44px); display:block; margin-bottom:2px; filter:drop-shadow(0 3px 6px rgba(0,0,0,0.25)); }
.header h1 { font-family:var(--font-head); font-size:var(--fs-xl); font-weight:900; color:#fff; letter-spacing:-1px; }
.header p { font-size:var(--fs-sm); color:rgba(255,255,255,0.65); font-weight:500; margin-top:2px; }

/* Mode transition overlay */
.mode-flash {
  position:fixed; top:0; left:0; right:0; bottom:0; z-index:9999;
  pointer-events:none; opacity:0; transition:opacity 0.5s ease;
}
.mode-flash.active { opacity:1; animation:flashPulse 0.6s ease-out; }
@keyframes flashPulse { 0%{opacity:0} 20%{opacity:0.35} 100%{opacity:0} }

/* Theme picker overlay */
.theme-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0; z-index:1000;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  display:none; align-items:flex-end; justify-content:center;
  animation:fadeIn 0.25s ease;
}
.theme-overlay.show { display:flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.theme-sheet {
  background:var(--card); border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding:clamp(20px,4vw,28px); width:100%; max-width:var(--app-max);
  max-height:70vh; overflow-y:auto;
  animation:slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
  transition:background var(--trans);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.theme-sheet h3 { font-family:var(--font-head); font-size:var(--fs-lg); font-weight:800; margin-bottom:14px; }
.theme-option {
  display:flex; align-items:center; gap:12px; padding:14px; border-radius:var(--radius);
  cursor:pointer; transition:all 0.2s; margin-bottom:8px; border:2px solid transparent;
}
.theme-option:hover { background:var(--accent-bg); }
.theme-option.active { border-color:var(--accent); background:var(--accent-bg); }
.theme-swatch {
  width:40px; height:40px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:18px;
}
.theme-info { flex:1; }
.theme-info strong { font-size:var(--fs-base); display:block; }
.theme-info span { font-size:var(--fs-xs); color:var(--text3); }
.theme-close {
  width:100%; padding:12px; border:none; border-radius:var(--radius);
  background:var(--accent); color:#fff; font-size:var(--fs-base); font-weight:700;
  cursor:pointer; font-family:inherit; margin-top:8px; transition:transform 0.15s;
}
.theme-close:active { transform:scale(0.97); }

/* ===================== PERIOD BAR ===================== */
.period-bar { display:flex; gap:clamp(4px,1vw,6px); padding:12px var(--pad) 0; }
.period-btn {
  flex:1; padding:clamp(6px,1.5vw,8px); border:1.5px solid var(--border); border-radius:10px;
  background:var(--card); color:var(--text2); font-size:var(--fs-sm); font-weight:700;
  cursor:pointer; transition:all var(--trans); font-family:inherit; text-align:center;
}
.period-btn.active { border-color:var(--accent); background:var(--accent-bg); color:var(--accent); }

/* ===================== TABS ===================== */
.tabs {
  display:flex; gap:clamp(6px,1.5vw,8px); padding:12px var(--pad) 0;
  position:sticky; top:0; z-index:100; background:var(--bg); transition:background var(--trans);
}
.tab-btn {
  flex:1; display:flex; align-items:center; justify-content:center; gap:clamp(4px,1vw,7px);
  padding:clamp(9px,2vw,11px); border:none; border-radius:14px; background:var(--card);
  color:var(--text2); font-size:var(--fs-base); font-weight:700; cursor:pointer;
  transition:all 0.3s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow);
  font-family:inherit; position:relative;
}
.tab-btn.active {
  background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
  box-shadow:0 6px 24px color-mix(in srgb, var(--accent) 35%, transparent);
  transform:translateY(-1px);
}
.tab-emoji { font-size:clamp(14px,3.5vw,17px); }
.badge {
  position:absolute; top:-5px; right:-5px; background:var(--red); color:#fff;
  font-size:var(--fs-xs); font-weight:800; border-radius:10px; padding:1px 7px;
  min-width:18px; text-align:center;
}

/* ===================== CONTENT ===================== */
.content { padding:14px var(--pad) 40px; flex:1; }
.tab-content { display:none; }
.tab-content.active { display:block; animation:fadeUp 0.35s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ===================== SHARED COMPONENTS ===================== */
.add-btn {
  width:100%; padding:clamp(12px,3vw,15px); border:2.5px dashed var(--border);
  border-radius:var(--radius); background:transparent; color:var(--accent);
  font-size:var(--fs-md); font-weight:700; cursor:pointer; transition:all 0.2s;
  margin-bottom:14px; font-family:inherit;
}
.form-card {
  background:var(--card); border-radius:var(--radius-lg); padding:var(--pad);
  margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--border);
  animation:fadeUp 0.25s ease; transition:background var(--trans), border-color var(--trans);
}
.form-card h3 { font-family:var(--font-head); font-size:var(--fs-lg); font-weight:800; margin-bottom:14px; }
.form-label {
  display:block; font-size:var(--fs-xs); font-weight:700; color:var(--text3);
  text-transform:uppercase; letter-spacing:0.8px; margin:12px 0 5px;
}
.form-select, .form-input {
  width:100%; padding:clamp(9px,2vw,11px) 14px; border-radius:12px;
  border:1.5px solid var(--border); font-size:var(--fs-base); font-family:inherit;
  background:var(--bg); color:var(--text); outline:none;
  transition:border-color 0.2s, background var(--trans), color var(--trans);
}
.form-select:focus, .form-input:focus { border-color:var(--accent); }
.form-actions { display:flex; gap:8px; margin-top:18px; }
.btn-cancel {
  flex:1; padding:11px; border:1.5px solid var(--border); border-radius:12px;
  background:var(--card); color:var(--text2); font-size:var(--fs-base); font-weight:600;
  cursor:pointer; font-family:inherit; transition:all var(--trans);
}
.btn-submit {
  flex:1; padding:11px; border:none; border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
  font-size:var(--fs-base); font-weight:700; cursor:pointer; font-family:inherit;
  box-shadow:0 4px 16px color-mix(in srgb, var(--accent) 30%, transparent);
  transition:transform 0.15s;
}
.btn-submit:active { transform:scale(0.97); }

/* ===================== SUBJECT CARDS ===================== */
.sgc {
  background:var(--card); border-radius:calc(var(--radius) + 2px); padding:var(--pad);
  margin-bottom:clamp(8px,1.5vw,10px); box-shadow:var(--shadow); cursor:pointer;
  transition:all var(--trans); border:1.5px solid transparent;
}
.sgc:hover { border-color:var(--accent); }
.sgc.open { border-color:var(--accent); cursor:default; }
.sgc-header { display:flex; align-items:center; gap:clamp(8px,2vw,10px); }
.sgc-emoji { font-size:clamp(22px,5.5vw,26px); }
.sgc-info { flex:1; }
.sgc-name { font-size:var(--fs-md); font-weight:700; }
.sgc-detail { font-size:var(--fs-sm); color:var(--text3); margin-top:1px; }
.sgc-avg { font-family:var(--font-head); font-size:clamp(24px,6vw,28px); font-weight:900; letter-spacing:-1px; text-align:right; }
.sgc-avg-note { font-size:var(--fs-xs); font-weight:600; color:var(--text3); text-align:right; }
.sgc-no { font-size:clamp(20px,5vw,24px); color:var(--text3); font-weight:300; }

.sgc-expand { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); animation:fadeUp 0.2s ease; }
.entry-row { display:flex; gap:clamp(8px,2vw,12px); margin-bottom:8px; }
.entry-col { flex:1; text-align:center; }
.entry-col label {
  display:block; font-size:var(--fs-xs); font-weight:700; color:var(--text3);
  text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;
}
.qgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:clamp(3px,0.8vw,4px); }
.qbtn {
  height:clamp(28px,7vw,34px); border:1.5px solid var(--border); border-radius:8px;
  font-size:var(--fs-sm); font-weight:700; cursor:pointer; transition:all 0.2s;
  font-family:inherit; background:var(--bg); color:var(--text2);
}
.qbtn.active { border-color:transparent; color:#fff; }
.save-row { display:flex; gap:8px; margin-top:14px; }

.eg { margin-top:12px; padding-top:10px; border-top:1px solid var(--border); }
.eg-title { font-size:var(--fs-xs); font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
.eg-item { display:flex; align-items:center; gap:clamp(4px,1vw,8px); padding:5px 0; font-size:var(--fs-sm); flex-wrap:wrap; }
.eg-type { font-weight:600; color:var(--text2); width:clamp(56px,14vw,68px); font-size:var(--fs-xs); }
.eg-pts { font-family:var(--font-head); font-weight:800; font-size:var(--fs-md); }
.eg-note { font-size:var(--fs-xs); color:var(--text3); flex:1; }
.eg-date { font-size:var(--fs-xs); color:var(--text3); }
.eg-del { border:none; background:none; color:var(--text3); font-size:15px; cursor:pointer; padding:2px 4px; border-radius:6px; }

/* ===================== HOMEWORK ===================== */
.hw-card {
  display:flex; align-items:flex-start; gap:clamp(8px,2vw,11px); background:var(--card);
  border-radius:var(--radius); padding:var(--pad); margin-bottom:8px; box-shadow:var(--shadow);
  transition:background var(--trans);
}
.hw-card.done { opacity:0.5; }
.hw-check {
  width:clamp(20px,5vw,24px); height:clamp(20px,5vw,24px); border-radius:8px; border:2.5px solid;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; margin-top:1px; font-size:13px; font-weight:700; color:transparent;
  transition:all 0.25s;
}
.hw-check.checked { color:#fff; }
.hw-body { flex:1; min-width:0; }
.hw-top { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:3px; }
.stag {
  display:inline-flex; align-items:center; gap:3px;
  padding:2px 9px; border-radius:7px; font-size:var(--fs-sm); font-weight:700; white-space:nowrap;
}
.overdue-tag { font-size:var(--fs-xs); font-weight:700; color:var(--red); background:rgba(229,62,62,0.1); padding:2px 7px; border-radius:6px; }
.hw-text { font-size:var(--fs-base); color:var(--text); line-height:1.45; word-break:break-word; margin:2px 0; }
.hw-text.strike { text-decoration:line-through; color:var(--text2); }
.hw-due { font-size:var(--fs-sm); font-weight:500; margin-top:2px; }
.del-btn { border:none; background:none; color:var(--text3); font-size:17px; cursor:pointer; padding:4px; line-height:1; border-radius:8px; flex-shrink:0; }

.section-div { display:flex; align-items:center; gap:10px; margin:18px 0 10px; }
.section-line { flex:1; height:1px; background:var(--border); transition:background var(--trans); }
.section-label { font-size:var(--fs-xs); font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.6px; }

.avg-card {
  background:var(--card); border-radius:var(--radius-lg); padding:var(--pad); margin-bottom:14px;
  box-shadow:var(--shadow); border:1px solid var(--border); text-align:center;
  transition:all var(--trans);
}
.avg-label { font-size:var(--fs-xs); font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; }
.avg-value { font-family:var(--font-head); font-size:var(--fs-hero); font-weight:900; letter-spacing:-1.5px; display:block; margin:2px 0; }
.avg-note { font-size:var(--fs-sm); color:var(--text2); font-weight:500; }

.empty { text-align:center; padding:clamp(30px,8vw,44px) 20px; }
.empty-icon { font-size:clamp(40px,10vw,52px); display:block; margin-bottom:8px; }
.empty-text { font-size:var(--fs-md); font-weight:600; color:var(--text2); }
.empty-hint { font-size:var(--fs-sm); color:var(--text3); margin-top:4px; }
.hint-text { font-size:var(--fs-sm); color:var(--text3); text-align:center; margin-bottom:12px; }
</style>
</head>
<body>
<div class="mode-flash" id="mode-flash"></div>

<div class="app">
  <div class="header">
    <div class="header-content">
      <div class="header-top">
        <button class="theme-toggle" onclick="showThemes()">🎨</button>
        <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()">🌙</button>
      </div>
      <span class="header-logo">🎓</span>
      <h1>SchulHelfer</h1>
      <p>Oberstufe im Griff</p>
    </div>
  </div>

  <div class="period-bar" id="period-bar"></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="homework" onclick="switchTab('homework')">
      <span class="tab-emoji">📋</span> Hausaufgaben
      <span class="badge" id="hw-badge" style="display:none">0</span>
    </button>
    <button class="tab-btn" data-tab="grades" onclick="switchTab('grades')">
      <span class="tab-emoji">📊</span> Noten
    </button>
  </div>

  <div class="content">
    <div class="tab-content active" id="tab-homework">
      <button class="add-btn" id="hw-add-btn" onclick="toggleHwForm(true)">+ Neue Hausaufgabe</button>
      <div class="form-card" id="hw-form" style="display:none">
        <h3>Neue Hausaufgabe</h3>
        <label class="form-label">Fach</label>
        <select class="form-select" id="hw-subject"></select>
        <label class="form-label">Aufgabe</label>
        <input class="form-input" id="hw-text" type="text" placeholder="z.B. S. 42 Nr. 3a-d">
        <label class="form-label">Fällig am (optional)</label>
        <input class="form-input" id="hw-date" type="date">
        <div class="form-actions">
          <button class="btn-cancel" onclick="toggleHwForm(false)">Abbrechen</button>
          <button class="btn-submit" onclick="addHomework()">Hinzufügen</button>
        </div>
      </div>
      <div id="hw-open-list"></div>
      <div id="hw-done-section"></div>
    </div>
    <div class="tab-content" id="tab-grades">
      <div id="avg-overview"></div>
      <p class="hint-text">Tippe auf ein Fach, um Noten einzutragen</p>
      <div id="subject-list"></div>
    </div>
  </div>
</div>

<!-- Theme Picker -->
<div class="theme-overlay" id="theme-overlay" onclick="if(event.target===this)hideThemes()">
  <div class="theme-sheet">
    <h3>Design wählen</h3>
    <div id="theme-list"></div>
    <button class="theme-close" onclick="hideThemes()">Fertig</button>
  </div>
</div>

<script>
const SUBJECTS=[
  {name:"Deutsch",emoji:"📖",color:"#c0392b"},{name:"Mathematik",emoji:"📐",color:"#2563eb"},
  {name:"Englisch",emoji:"🇬🇧",color:"#7c3aed"},{name:"Französisch",emoji:"🇫🇷",color:"#1d4ed8"},
  {name:"Spanisch",emoji:"🇪🇸",color:"#ca8a04"},{name:"Latein",emoji:"🏛️",color:"#92400e"},
  {name:"Geschichte",emoji:"⏳",color:"#a0522d"},{name:"Politik/Wirtschaft",emoji:"🏛️",color:"#1e40af"},
  {name:"Erdkunde",emoji:"🌍",color:"#15803d"},{name:"Physik",emoji:"⚛️",color:"#0369a1"},
  {name:"Chemie",emoji:"🧪",color:"#7e22ce"},{name:"Biologie",emoji:"🧬",color:"#16a34a"},
  {name:"Informatik",emoji:"💻",color:"#0d9488"},{name:"Kunst",emoji:"🎨",color:"#dc2626"},
  {name:"Musik",emoji:"🎵",color:"#9333ea"},{name:"Sport",emoji:"⚽",color:"#ea580c"},
  {name:"Religion",emoji:"✝️",color:"#6b7280"},{name:"Ethik",emoji:"🤔",color:"#475569"},
  {name:"Philosophie",emoji:"💭",color:"#64748b"},{name:"Seminarfach",emoji:"📝",color:"#334155"},
];

const THEMES=[
  {id:"indigo",name:"Indigo",desc:"Klassisch & klar",emoji:"💜",swatch:"linear-gradient(135deg,#4338ca,#6d5dfc)"},
  {id:"forest",name:"Forest",desc:"Natürlich & ruhig",emoji:"🌿",swatch:"linear-gradient(135deg,#2d6a4f,#52b788)"},
  {id:"rose",name:"Rosé",desc:"Elegant & warm",emoji:"🌸",swatch:"linear-gradient(135deg,#b5446e,#d76d8f)"},
  {id:"cyber",name:"Cyber",desc:"Technisch & modern",emoji:"⚡",swatch:"linear-gradient(135deg,#0c4a6e,#0ea5e9)"},
  {id:"sunset",name:"Sunset",desc:"Warm & gemütlich",emoji:"🌅",swatch:"linear-gradient(135deg,#b45309,#f59e0b)"},
];

const PERIODS=[{id:"q1",label:"Q1"},{id:"q2",label:"Q2"},{id:"q3",label:"Q3"},{id:"q4",label:"Q4"}];
const PL={15:"1+",14:"1",13:"1-",12:"2+",11:"2",10:"2-",9:"3+",8:"3",7:"3-",6:"4+",5:"4",4:"4-",3:"5+",2:"5",1:"5-",0:"6"};

function pc(p){if(p>=13)return"#16a34a";if(p>=10)return"#65a30d";if(p>=7)return"#ca8a04";if(p>=4)return"#ea580c";return"#dc2626"}
function gs(n){return SUBJECTS.find(s=>s.name===n)||SUBJECTS[0]}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fd(d){return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}

let homework=JSON.parse(localStorage.getItem('sh2-hw')||'[]');
let grades=JSON.parse(localStorage.getItem('sh2-gr')||'[]');
let curP=localStorage.getItem('sh2-p')||'q1';
let dark=localStorage.getItem('sh2-dk')==='true';
let curTheme=localStorage.getItem('sh2-th')||'indigo';
let openS=null,tmpW=null,tmpO=null;

function save(){
  localStorage.setItem('sh2-hw',JSON.stringify(homework));
  localStorage.setItem('sh2-gr',JSON.stringify(grades));
  localStorage.setItem('sh2-p',curP);
  localStorage.setItem('sh2-dk',dark);
  localStorage.setItem('sh2-th',curTheme);
}

// ==================== THEME & DARK MODE ====================
function applyTheme(){
  const el=document.documentElement;
  el.setAttribute('data-theme-base',curTheme);
  el.setAttribute('data-mode',dark?'dark':'light');
  document.getElementById('dark-toggle').textContent=dark?'☀️':'🌙';
}

function toggleDark(){
  const flash=document.getElementById('mode-flash');
  flash.style.background=dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';
  flash.classList.add('active');
  setTimeout(()=>flash.classList.remove('active'),600);
  dark=!dark; save(); applyTheme();
}

function setTheme(id){
  curTheme=id; save(); applyTheme(); renderThemeList();
}

function showThemes(){ document.getElementById('theme-overlay').classList.add('show'); renderThemeList(); }
function hideThemes(){ document.getElementById('theme-overlay').classList.remove('show'); }

function renderThemeList(){
  document.getElementById('theme-list').innerHTML=THEMES.map(t=>
    `<div class="theme-option${curTheme===t.id?' active':''}" onclick="setTheme('${t.id}')">
      <div class="theme-swatch" style="background:${t.swatch}">${t.emoji}</div>
      <div class="theme-info"><strong>${t.name}</strong><span>${t.desc}</span></div>
    </div>`
  ).join('');
}

// ==================== PERIODS & TABS ====================
function renderPeriods(){
  document.getElementById('period-bar').innerHTML=PERIODS.map(p=>
    `<button class="period-btn${curP===p.id?' active':''}" onclick="setP('${p.id}')">${p.label}</button>`
  ).join('');
}
function setP(id){curP=id;openS=null;save();renderPeriods();renderHW();renderGR()}
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+t));
}

// ==================== HOMEWORK ====================
function popSel(){
  document.getElementById('hw-subject').innerHTML=SUBJECTS.map(s=>`<option value="${s.name}">${s.emoji} ${s.name}</option>`).join('');
}
function toggleHwForm(show){
  document.getElementById('hw-form').style.display=show?'block':'none';
  document.getElementById('hw-add-btn').style.display=show?'none':'block';
  if(show)document.getElementById('hw-text').focus();
}
function addHomework(){
  const t=document.getElementById('hw-text').value.trim();
  if(!t)return;
  homework.unshift({id:Date.now(),subject:document.getElementById('hw-subject').value,text:t,due:document.getElementById('hw-date').value||null,done:false,period:curP});
  save();document.getElementById('hw-text').value='';document.getElementById('hw-date').value='';
  toggleHwForm(false);renderHW();
}
function toggleDone(id){const i=homework.find(h=>h.id===id);if(i)i.done=!i.done;save();renderHW()}
function removeHW(id){homework=homework.filter(h=>h.id!==id);save();renderHW()}

function renderHW(){
  const f=homework.filter(h=>!h.period||h.period===curP);
  const o=f.filter(h=>!h.done),d=f.filter(h=>h.done);
  const today=new Date(new Date().toDateString());
  const b=document.getElementById('hw-badge');
  b.textContent=o.length;b.style.display=o.length>0?'block':'none';

  document.getElementById('hw-open-list').innerHTML=o.length===0&&d.length===0
    ?`<div class="empty"><span class="empty-icon">📚</span><p class="empty-text">Keine Hausaufgaben in ${PERIODS.find(p=>p.id===curP).label}.</p><p class="empty-hint">Tippe auf "+ Neue Hausaufgabe" um loszulegen!</p></div>`
    :o.map(h=>{const s=gs(h.subject);const ov=h.due&&new Date(h.due)<today;
      return`<div class="hw-card"><div class="hw-check" style="border-color:${s.color}" onclick="toggleDone(${h.id})"></div><div class="hw-body"><div class="hw-top"><span class="stag" style="background:${s.color}15;color:${s.color}">${s.emoji} ${s.name}</span>${ov?'<span class="overdue-tag">Überfällig!</span>':''}</div><p class="hw-text">${esc(h.text)}</p>${h.due?`<p class="hw-due" style="color:${ov?'var(--red)':'var(--text3)'}">Fällig: ${fd(h.due)}</p>`:''}</div><button class="del-btn" onclick="removeHW(${h.id})">✕</button></div>`}).join('');

  document.getElementById('hw-done-section').innerHTML=d.length===0?'':
    `<div class="section-div"><span class="section-line"></span><span class="section-label">Erledigt (${d.length})</span><span class="section-line"></span></div>`+
    d.map(h=>{const s=gs(h.subject);
      return`<div class="hw-card done"><div class="hw-check checked" style="border-color:${s.color};background:${s.color}" onclick="toggleDone(${h.id})">✓</div><div class="hw-body"><span class="stag" style="background:${s.color}15;color:${s.color};font-size:11px">${s.emoji} ${s.name}</span><p class="hw-text strike">${esc(h.text)}</p></div><button class="del-btn" onclick="removeHW(${h.id})">✕</button></div>`}).join('');
}

// ==================== GRADES ====================
function gfs(n){return grades.filter(g=>g.subject===n&&g.period===curP)}
function calcAvg(sg){
  if(!sg.length)return null;
  const w=sg.filter(g=>g.type==='S'),o=sg.filter(g=>g.type==='M');
  const wa=w.length?w.reduce((s,g)=>s+g.points,0)/w.length:null;
  const oa=o.length?o.reduce((s,g)=>s+g.points,0)/o.length:null;
  if(wa!==null&&oa!==null)return Math.round((wa+oa)/2*10)/10;
  return wa!==null?Math.round(wa*10)/10:oa!==null?Math.round(oa*10)/10:null;
}
function togS(n){if(openS===n){openS=null}else{openS=n;tmpW=null;tmpO=null}renderGR()}
function setTG(t,v){if(t==='w')tmpW=tmpW===v?null:v;if(t==='o')tmpO=tmpO===v?null:v;renderGR()}
function saveGE(n){
  const now=new Date().toISOString().slice(0,10);
  if(tmpW!==null)grades.unshift({id:Date.now(),subject:n,points:tmpW,type:'S',period:curP,date:now});
  if(tmpO!==null)grades.unshift({id:Date.now()+1,subject:n,points:tmpO,type:'M',period:curP,date:now});
  tmpW=null;tmpO=null;save();renderGR();
}
function remGR(id){grades=grades.filter(g=>g.id!==id);save();renderGR()}

function qbtns(type,sel){
  let h='<div class="qgrid">';
  for(let p=15;p>=0;p--){const a=sel===p;const c=a?pc(p):'';
    h+=`<button class="qbtn${a?' active':''}" style="${a?'background:'+c+';border-color:'+c:''}" onclick="event.stopPropagation();setTG('${type}',${p})">${p}</button>`;}
  h+='</div>';return h;
}

function renderGR(){
  const sAvgs=[];
  SUBJECTS.forEach(s=>{const a=calcAvg(gfs(s.name));if(a!==null)sAvgs.push(a)});
  const tAvg=sAvgs.length?(sAvgs.reduce((a,b)=>a+b,0)/sAvgs.length).toFixed(1):null;

  document.getElementById('avg-overview').innerHTML=tAvg!==null?`
    <div class="avg-card">
      <span class="avg-label">Schnitt ${PERIODS.find(p=>p.id===curP).label}</span>
      <span class="avg-value" style="color:${pc(Math.round(tAvg))}">${tAvg} Punkte</span>
      <span class="avg-note">≈ Note ${PL[Math.round(tAvg)]} · ${sAvgs.length} Fächer</span>
    </div>`:'';

  document.getElementById('subject-list').innerHTML=SUBJECTS.map(s=>{
    const sg=gfs(s.name),avg=calcAvg(sg);
    const w=sg.filter(g=>g.type==='S'),o=sg.filter(g=>g.type==='M');
    const wa=w.length?(w.reduce((a,g)=>a+g.points,0)/w.length).toFixed(1):null;
    const oa=o.length?(o.reduce((a,g)=>a+g.points,0)/o.length).toFixed(1):null;
    const isO=openS===s.name;

    let det='Noch keine Noten';
    if(wa!==null&&oa!==null)det=`✍️ ${wa} · 🗣️ ${oa}`;
    else if(wa!==null)det=`✍️ Schriftlich: ${wa}`;
    else if(oa!==null)det=`🗣️ Mündlich: ${oa}`;

    let exp='';
    if(isO){
      exp=`<div class="sgc-expand">
        <div class="entry-row">
          <div class="entry-col"><label>✍️ Schriftlich</label>${qbtns('w',tmpW)}</div>
          <div class="entry-col"><label>🗣️ Mündlich</label>${qbtns('o',tmpO)}</div>
        </div>
        <div class="save-row">
          <button class="btn-cancel" onclick="event.stopPropagation();togS('${s.name}')">Abbrechen</button>
          <button class="btn-submit" onclick="event.stopPropagation();saveGE('${s.name}')" ${tmpW===null&&tmpO===null?'disabled style="opacity:0.5"':''}>Speichern</button>
        </div>
        ${sg.length?`<div class="eg"><div class="eg-title">Bisherige Einträge</div>${sg.map(g=>
          `<div class="eg-item"><span class="eg-type">${g.type==='S'?'✍️ Schr.':'🗣️ Mdl.'}</span><span class="eg-pts" style="color:${pc(g.points)}">${g.points}</span><span class="eg-note">(${PL[g.points]})</span><span class="eg-date">${fd(g.date)}</span><button class="eg-del" onclick="event.stopPropagation();remGR(${g.id})">✕</button></div>`
        ).join('')}</div>`:''}
      </div>`;
    }

    return`<div class="sgc${isO?' open':''}" onclick="${isO?'':`togS('${s.name}')`}">
      <div class="sgc-header">
        <span class="sgc-emoji">${s.emoji}</span>
        <div class="sgc-info"><div class="sgc-name">${s.name}</div><div class="sgc-detail">${det}</div></div>
        ${avg!==null?`<div><div class="sgc-avg" style="color:${pc(Math.round(avg))}">${avg}</div><div class="sgc-avg-note">${PL[Math.round(avg)]}</div></div>`:`<span class="sgc-no">—</span>`}
      </div>${exp}</div>`;
  }).join('');
}

document.getElementById('hw-text').addEventListener('keydown',e=>{if(e.key==='Enter')addHomework()});

applyTheme();popSel();renderPeriods();renderHW();renderGR();
</script>
</body>
</html>
